name: Gerar Boletim Epidemiologico Semanal
on:
  # Todo domingo 8h BRT (11h UTC) č apos extracao diaria do Maestro
  schedule:
    - cron: '0 11 * * 0'
  # Execucao manual para reprocessar qualquer semana
  workflow_dispatch:
    inputs:
      semana_epi:
        description: 'SE alvo (deixe vazio para SE anterior ao domingo)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  boletim:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install numpy pandas

      - name: Baixar CSV do Google Drive
        env:
          GDRIVE_FILE_ID: ${{ secrets.GDRIVE_FILE_ID }}
        run: |
          echo "Baixando CSV..."
          curl -sL "https://drive.google.com/uc?export=download&id=${GDRIVE_FILE_ID}" \
            -o dados_ids.csv
          if head -c 100 dados_ids.csv | grep -qi "html"; then
            CONFIRM=$(curl -sc /tmp/gcookie \
              "https://drive.google.com/uc?export=download&id=${GDRIVE_FILE_ID}" \
              | grep -oP 'confirm=\K[^&]+' || echo "t")
            curl -sL -b /tmp/gcookie \
              "https://drive.google.com/uc?export=download&confirm=${CONFIRM}&id=${GDRIVE_FILE_ID}" \
              -o dados_ids.csv
          fi
          echo "$(wc -l < dados_ids.csv) linhas"

      - name: Gerar boletim da semana epidemiologica
        run: |
          SE_INPUT="${{ github.event.inputs.semana_epi }}"
          if [ -n "$SE_INPUT" ]; then
            python generate_boletim.py dados_ids.csv --se $SE_INPUT
          else
            python generate_boletim.py dados_ids.csv
          fi

      - name: Commit e push boletim
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add boletins/
          if git diff --cached --quiet; then
            echo "Boletim sem alteracoes."
          else
            DOMINGO=$(TZ=America/Sao_Paulo date '+%d/%m/%Y')
            git commit -m "Boletim SE encerrada em ${DOMINGO}"
            git push
            echo "Boletim publicado!"
          fi
