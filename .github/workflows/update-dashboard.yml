name: Atualizar Dashboard Epidemiológico

on:
  # Disparado pelo Apps Script após extração IDS (csv-updated)
  repository_dispatch:
    types: [csv-updated]
  # Fallback: toda madrugada às 3h Brasília (6h UTC) — extração automática
  schedule:
    - cron: '0 6 * * *'
  # Execução manual pelo GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install pandas numpy

      - name: Identificar origem do trigger
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "Origem: dispatch do Apps Script (csv-updated)"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Origem: cron diário (fallback madrugada)"
          else
            echo "Origem: execução manual"
          fi

      - name: Baixar CSV do Google Drive
        env:
          GDRIVE_FILE_ID: ${{ secrets.GDRIVE_FILE_ID }}
        run: |
          echo "Baixando canal_endemico_input.csv do Google Drive..."
          # Primeira tentativa (arquivos pequenos, download direto)
          curl -sL "https://drive.google.com/uc?export=download&id=${GDRIVE_FILE_ID}" \
            -o dados_ids.csv
          # Se o arquivo for HTML (página de confirmação para arquivos grandes)
          if file dados_ids.csv | grep -q HTML; then
            echo "Arquivo grande detectado — usando confirmação..."
            CONFIRM=$(curl -sc /tmp/cookies.txt \
              "https://drive.google.com/uc?export=download&id=${GDRIVE_FILE_ID}" | \
              grep -o 'confirm=[^&"]*' | head -1 | cut -d= -f2)
            curl -sLb /tmp/cookies.txt \
              "https://drive.google.com/uc?export=download&confirm=${CONFIRM}&id=${GDRIVE_FILE_ID}" \
              -o dados_ids.csv
          fi
          echo "CSV baixado: $(wc -l < dados_ids.csv) linhas"

      - name: Calcular anos base históricos
        id: hist_years
        run: |
          python3 -c "
          import datetime
          excl = [2021, 2022]
          ano = datetime.date.today().year
          years = [y for y in range(ano - 5, ano) if y not in excl]
          print(','.join(map(str, years)))
          " > /tmp/hist_years.txt
          echo "base_hist_years=$(cat /tmp/hist_years.txt)" >> $GITHUB_OUTPUT
          echo "Anos base históricos: $(cat /tmp/hist_years.txt)"

      - name: Verificar se canais precisam ser recalculados
        id: check_channels
        run: |
          # Canais são recalculados apenas em janeiro (início do ano epidemiológico)
          # ou se channel_data.json não existir
          MONTH=$(date +%m)
          if [ ! -f channel_data.json ] || [ "$MONTH" = "01" ]; then
            echo "recompute_channels=true" >> $GITHUB_OUTPUT
            echo "Canais serão recalculados (janeiro ou arquivo ausente)"
          else
            echo "recompute_channels=false" >> $GITHUB_OUTPUT
            echo "Canais existentes mantidos (fora de janeiro)"
          fi

      - name: Recalcular canais endêmicos (apenas janeiro ou primeiro run)
        if: steps.check_channels.outputs.recompute_channels == 'true'
        run: |
          echo "Recalculando canais endêmicos..."
          echo "Anos base: ${{ steps.hist_years.outputs.base_hist_years }}"
          python3 compute_channels.py dados_ids.csv \
            --pop '{"2021":210000,"2022":210000,"2023":210000,"2024":210000,"2025":210000,"2026":210000}' \
            --output channel_data.json \
            --agravos all \
            --base-hist-years ${{ steps.hist_years.outputs.base_hist_years }}

      - name: Atualizar dashboard (dados + boletim) sem recalcular canais
        if: steps.check_channels.outputs.recompute_channels == 'false'
        run: |
          echo "Atualizando dashboard com novos dados (canais fixos mantidos)..."
          echo "Anos base: ${{ steps.hist_years.outputs.base_hist_years }}"
          python3 compute_channels.py dados_ids.csv \
            --pop '{"2021":210000,"2022":210000,"2023":210000,"2024":210000,"2025":210000,"2026":210000}' \
            --output channel_data.json \
            --agravos all \
            --base-hist-years ${{ steps.hist_years.outputs.base_hist_years }} \
            --skip-channel-estimation

      - name: Gerar index.html
        run: |
          python3 pipeline.py dados_ids.csv --output index.html

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add channel_data.json index.html
          git diff --cached --quiet && echo "Sem alterações" && exit 0
          SE=$(python3 -c "
          import json, datetime
          with open('channel_data.json') as f:
              d = json.load(f)
          ch = list(d['channels'].values())[0]
          se = max((r['se'] for r in ch['raw'] if r.get('c2026',0)>0), default=0)
          print(se)
          ")
          git commit -m "Dashboard atualizado — SE ${SE}/2026 [$(date '+%d/%m/%Y %H:%M')]"
          git push
