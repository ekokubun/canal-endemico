name: Atualizar Dashboard Epidemiologico
on:
  # Fallback diario: 5h BRT (8h UTC) č caso o GAS nao dispare
  schedule:
    - cron: '0 8 * * *'
  # Disparado pelo GAS logo apos extracao diaria do Maestro
  workflow_dispatch:
    inputs:
      force_recompute:
        description: 'Recomputar canais endemicos (uso anual č virada de ano)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install numpy pandas

      - name: Baixar CSV do Google Drive
        env:
          GDRIVE_FILE_ID: ${{ secrets.GDRIVE_FILE_ID }}
        run: |
          echo "Baixando CSV do Google Drive..."
          curl -sL "https://drive.google.com/uc?export=download&id=${GDRIVE_FILE_ID}" \
            -o dados_ids.csv
          if head -c 100 dados_ids.csv | grep -qi "html"; then
            echo "Detectada pagina de confirmacao. Re-baixando com token..."
            CONFIRM=$(curl -sc /tmp/gcookie \
              "https://drive.google.com/uc?export=download&id=${GDRIVE_FILE_ID}" \
              | grep -oP 'confirm=\K[^&]+' || echo "t")
            curl -sL -b /tmp/gcookie \
              "https://drive.google.com/uc?export=download&confirm=${CONFIRM}&id=${GDRIVE_FILE_ID}" \
              -o dados_ids.csv
          fi
          LINHAS=$(wc -l < dados_ids.csv)
          echo "Arquivo baixado: ${LINHAS} linhas"
          echo "Primeiras 3 linhas:"
          head -3 dados_ids.csv
          if head -c 100 dados_ids.csv | grep -qi "html"; then
            echo "ERRO: Arquivo baixado e HTML, nao CSV!"
            exit 1
          fi
          if [ "$LINHAS" -lt 10 ]; then
            echo "ERRO: CSV tem menos de 10 linhas."
            exit 1
          fi

      - name: Executar pipeline (canais fixos por padrao)
        run: |
          EXTRA_FLAG=""
          if [ "${{ github.event.inputs.force_recompute }}" = "true" ]; then
            EXTRA_FLAG="--force-recompute"
            echo "Modo: RECOMPUTE ANUAL de canais"
          else
            echo "Modo: atualizacao diaria com canais fixos"
          fi
          python pipeline.py dados_ids.csv \
            --pop 210000 \
            --output index.html \
            $EXTRA_FLAG
          echo "Dashboard gerado: $(du -h index.html | cut -f1)"

      - name: Commit e push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          # channel_data.json (canais fixos č so muda se --force-recompute)
          # index.html (atualizado diariamente com novos dados)
          git add index.html
          [ -f channel_data.json ] && git add channel_data.json || true
          if git diff --cached --quiet; then
            echo "Sem alteracoes. Nada a commitar."
          else
            HOJE=$(TZ=America/Sao_Paulo date '+%d/%m/%Y %H:%M')
            git commit -m "Atualizacao automatica do dashboard č ${HOJE}"
            git push
            echo "Dashboard atualizado e publicado!"
          fi
