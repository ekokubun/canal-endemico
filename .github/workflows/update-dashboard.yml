name: Atualizar Dashboard Epidemiológico

on:
  schedule:
    - cron: '0 11 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install numpy pandas

      - name: Baixar CSV do Google Drive
        env:
          GDRIVE_FILE_ID: ${{ secrets.GDRIVE_FILE_ID }}
        run: |
          echo "Baixando CSV do Google Drive..."
          curl -L "https://drive.google.com/uc?export=download&id=${GDRIVE_FILE_ID}" \
            -o dados_ids.csv
          echo "Arquivo baixado: $(wc -l < dados_ids.csv) linhas"

      - name: Executar pipeline completo
        run: |
          python pipeline.py dados_ids.csv \
            --pop 210000 \
            --output index.html
          echo "Dashboard gerado: $(du -h index.html | cut -f1)"

      - name: Commit e push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          if git diff --quiet index.html 2>/dev/null; then
            echo "Sem alterações no dashboard. Nada a commitar."
          else
            git add index.html
            HOJE=$(TZ=America/Sao_Paulo date '+%d/%m/%Y %H:%M')
            git commit -m "Atualização automática do dashboard — ${HOJE}"
            git push
            echo "Dashboard atualizado e publicado!"
          fi
