        const CATEGORIES = {"capitulos":["I - Doenças infecciosas e parasitárias","II - Neoplasias","III - Sangue e órgãos hematopoéticos","IV - Endócrinas, nutricionais e metabólicas","V - Transtornos mentais","VI - Sistema nervoso","VII - Olho e anexos","VIII - Ouvido e apófise mastóide","IX - Aparelho circulatório","X - Aparelho respiratório","XI - Aparelho digestivo","XII - Pele e tecido subcutâneo","XIII - Sistema osteomuscular","XIV - Aparelho geniturinário","XV - Gravidez, parto e puerpério","XVI - Afecções perinatais","XVII - Malformações congênitas","XVIII - Sintomas e sinais","XIX - Lesões e causas externas","XX - Causas externas de morbidade","XXI - Fatores que influenciam o estado de saúde"],"cids":["Total de atendimentos","Gastroenterites (A09+K52)","A09 - DIARREIA E GASTROENTERITE DE ORIGEM INFECCIOSA PRESUMIVEL","A90 - DENGUE [DENGUE CLASSICO]","Geniturinária (ITU+Cólica)","M54.5 - DOR LOMBAR BAIXA","J00 - NASOFARINGITE AGUDA [RESFRIADO COMUM]","R05 - TOSSE","J03.9 - AMIGDALITE AGUDA NAO ESPECIFICADA","M79.1 - MIALGIA","R11 - NAUSEA E VOMITOS","INFECCOES AGUDAS DAS VIAS AEREAS SUPERIORES DE LOCALIZACOES MULTIPLAS E NAO ESPECIFICADAS","R10 - DOR ABDOMINAL E PELVICA","R52.0 - DOR AGUDA","R51 - CEFALEIA","Z00.0 - EXAME MEDICO GERAL","Z53 - PROCEDIMENTO NAO REALIZADO DEVIDO A DECISAO DO PACIENTE POR OUTRAS RAZOES E AS NAO ESPECIFICADAS","M54 - DORSALGIA","M79.6 - DOR EM MEMBRO","R53 - MAL ESTAR, FADIGA","INFECCAO AGUDA DAS VIAS AEREAS SUPERIORES NAO ESPECIFICADA","Febril Inespecífica (R50)","INFECCAO VIRAL NAO ESPECIFICADA","I10 - HIPERTENSAO ESSENCIAL (PRIMARIA)","Exantemática (R21+B05-09)","Escorpionismo (X22+T632)","SINAN: Dengue","SINAN: Diarréia/gastroenterite","SINAN: Influenza NE","SINAN: Pneumonia NE","SINAN: Sífilis NE"],"sindromes":["Sínd. Gripal (IVAS+Febre)","Sínd. Respiratória (J09-J22)","Febril Inespecífica (R50)","Exantemática (R21+B05-09)","Gastroenterites (A09+K52)","Dor Osteomuscular","Cardiovascular Aguda","Geniturinária (ITU+Cólica)"," NAN: Hepatite B","SINAN: Hepatite C/outras","SINAN: Hepatite crônica viral","SINAN: HIV/AIDS","SINAN: HIV NE","SINAN: Hanseníase","SINAN: Febre maculosa","SINAN: Febre Q","SINAN: Tétano acidental","SINAN: Febre tifóide","SINAN: Caxumba"]};

const AGE_GROUPS = ["Bebês (0-1)", "Crianças (2-11)", "Adolescentes (12-17)", "Adultos jovens (18-39)", "Meia-idade (40-59)", "Idosos (60+)"];
const AGE_COLORS = {
  "Bebês (0-1)": "#f472b6",
  "Crianças (2-11)": "#38bdf8",
  "Adolescentes (12-17)": "#a78bfa",
  "Adultos jovens (18-39)": "#34d399",
  "Meia-idade (40-59)": "#fbbf24",
  "Idosos (60+)": "#ef4444",
};
    // ── Constantes de estilo ─────────────────────────────────────────────
const ZONE_COLORS = {
  sucesso:    { bg: "#064e3b", fg: "#34d399", label: "Sucesso",    fill: "#059669" },
  seguranca:  { bg: "#1e3a5f", fg: "#60a5fa", label: "Segurança",  fill: "#2563eb" },
  alerta:     { bg: "#78350f", fg: "#fbbf24", label: "Alerta",     fill: "#d97706" },
  epidemico:  { bg: "#7c2d12", fg: "#f97316", label: "Epidêmico",  fill: "#ea580c" },
  emergencia: { bg: "#7f1d1d", fg: "#ef4444", label: "Emergência", fill: "#dc2626" },
};

const YEAR_COLORS = {
  2021: "#6ee7b7", 2022: "#94a3b8", 2023: "#a78bfa",
  2024: "#38bdf8", 2025: "#f472b6", 2026: "#fbbf24",
};

const BAND_COLORS = [
  "rgba(5,150,105,0.25)",   // P10-P25 (sucesso)
  "rgba(37,99,235,0.25)",   // P25-P50 (segurança)
  "rgba(217,119,6,0.20)",   // P50-P75 (alerta)
  "rgba(234,88,12,0.20)",   // P75-P90 (epidêmico)
];

// ── Componentes auxiliares ───────────────────────────────────────────

function KpiCard({ label, value, sub, color = "#60a5fa" }) {
  return (
    <div style={{
      background: "rgba(255,255,255,0.04)",
      borderRadius: 12, padding: "14px 18px",
      border: "1px solid rgba(255,255,255,0.08)",
      minWidth: 140, flex: 1,
    }}>
      <div style={{ fontSize: 11, color: "#94a3b8", textTransform: "uppercase",
                    letterSpacing: 1, fontFamily: "DM Sans, sans-serif" }}>{label}</div>
      <div style={{ fontSize: 28, fontWeight: 700, color,
                    fontFamily: "JetBrains Mono, monospace", marginTop: 2 }}>
        {typeof value === "number" ? value.toLocaleString("pt-BR") : value}
      </div>
      {sub && <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>{sub}</div>}
    </div>
  );
}

function ZoneBadge({ zone }) {
  const z = ZONE_COLORS[zone] || ZONE_COLORS.seguranca;
  return (
    <span style={{
      background: z.bg, color: z.fg, padding: "2px 8px",
      borderRadius: 6, fontSize: 11, fontWeight: 600,
      fontFamily: "DM Sans, sans-serif",
    }}>{z.label}</span>
  );
}

// ── Heatmap multi-ano (últimos 5 anos + corrente, sempre visível) ────
function MultiYearHeatmap({ classifications, seList, years, raw, currentYear }) {
  // Últimos 5 anos + corrente
  const displayYears = years.slice(-6);

  // Detectar última SE com dados para o ano corrente
  const lastSeWithData = {};
  displayYears.forEach(y => {
    let lastSe = 0;
    seList.forEach((se, i) => {
      const obs = raw?.[i]?.[`c${y}`];
      if (obs != null && obs > 0) lastSe = se;
    });
    lastSeWithData[y] = lastSe;
  });

  return (
    <div style={{ overflowX: "auto" }}>
      {/* Header SE numbers */}
      <div style={{ display: "flex", alignItems: "flex-end", marginBottom: 2 }}>
        <div style={{ width: 52, minWidth: 52, fontSize: 10, color: "#64748b", textAlign: "right", paddingRight: 6 }}>SE</div>
        <div style={{ display: "flex", gap: 1 }}>
          {seList.map(se => (
            <div key={`h-${se}`} style={{
              width: 14, textAlign: "center", fontSize: 8, color: "#64748b",
              fontFamily: "JetBrains Mono, monospace",
            }}>
              {se % 4 === 0 ? se : ""}
            </div>
          ))}
        </div>
      </div>

      {/* Rows per year */}
      {displayYears.map(y => {
        const clf = classifications[String(y)];
        const isCurrentYear = y === currentYear;
        const lastSe = lastSeWithData[y] || 52;

        return (
          <div key={y} style={{ display: "flex", alignItems: "center", marginBottom: 2 }}>
            <div style={{
              width: 52, minWidth: 52, fontSize: 11, textAlign: "right", paddingRight: 6,
              fontFamily: "JetBrains Mono, monospace", fontWeight: isCurrentYear ? 700 : 400,
              color: isCurrentYear ? "#fbbf24" : "#94a3b8",
            }}>
              {y}{isCurrentYear ? " ★" : ""}
            </div>
            <div style={{ display: "flex", gap: 1 }}>
              {seList.map((se, i) => {
                const zone = clf?.[i] || null;
                const obs = raw?.[i]?.[`c${y}`];
                const hasData = obs != null && obs > 0;
                const isFuture = isCurrentYear && se > lastSe;

                if (!zone || isFuture) {
                  return (
                    <div key={`${y}-${se}`} style={{
                      width: 14, height: 18, borderRadius: 2,
                      background: "rgba(255,255,255,0.03)",
                      border: "1px solid rgba(255,255,255,0.04)",
                    }} title={`SE ${se}/${y}: sem dados`} />
                  );
                }

                const z = ZONE_COLORS[zone];
                return (
                  <div key={`${y}-${se}`} title={`SE ${se}/${y}: ${z.label} (${obs || 0} casos)`} style={{
                    width: 14, height: 18, borderRadius: 2,
                    background: z.fill,
                    opacity: hasData ? 0.9 : 0.3,
                    border: isCurrentYear ? "1px solid rgba(251,191,36,0.3)" : "1px solid transparent",
                    cursor: "default",
                    transition: "transform 0.1s",
                  }}
                  onMouseEnter={e => e.target.style.transform = "scale(1.4)"}
                  onMouseLeave={e => e.target.style.transform = "scale(1)"}
                  />
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// Manter versão single-year para compatibilidade
function ClassificationHeatmap({ classifications, seList, year }) {
  const clf = classifications[String(year)];
  if (!clf) return null;
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 2, marginTop: 8 }}>
      {seList.map((se, i) => {
        const zone = clf[i] || "seguranca";
        const z = ZONE_COLORS[zone];
        return (
          <div key={se} title={`SE ${se}: ${z.label}`} style={{
            width: 16, height: 24, borderRadius: 3,
            background: z.fill, opacity: 0.85,
            display: "flex", alignItems: "flex-end", justifyContent: "center",
          }}>
            {se % 5 === 0 && (
              <span style={{ fontSize: 7, color: "rgba(255,255,255,0.6)" }}>{se}</span>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── Tooltip personalizado ────────────────────────────────────────────
function CustomTooltip({ active, payload, label, channelData, year }) {
  if (!active || !payload || !payload.length) return null;
  const se = label;
  const seIdx = (channelData?.se_list || []).indexOf(se);
  const ch = channelData?.channels?.[String(year)]?.[seIdx];
  const clf = channelData?.classifications?.[String(year)]?.[seIdx];
  const obs = channelData?.raw?.[seIdx]?.[`c${year}`];

  return (
    <div style={{
      background: "rgba(15,12,41,0.95)", border: "1px solid rgba(255,255,255,0.15)",
      borderRadius: 10, padding: 12, fontSize: 12, color: "#e2e8f0",
      fontFamily: "DM Sans, sans-serif", backdropFilter: "blur(8px)",
      maxWidth: 280,
    }}>
      <div style={{ fontWeight: 700, marginBottom: 6, fontSize: 13 }}>SE {se}</div>
      {obs != null && (
        <div style={{ marginBottom: 4 }}>
          Observado: <b style={{ color: "#fbbf24" }}>{obs.toLocaleString("pt-BR")}</b>
          {clf && <> — <ZoneBadge zone={clf} /></>}
        </div>
      )}
      {ch && (
        <div style={{ fontSize: 11, color: "#94a3b8", lineHeight: 1.6 }}>
          P10: {ch[0]} · Esperado: {ch[2]}<br />
          Limite crítico: {ch[4]}
        </div>
      )}
    </div>
  );
}

// ── Gráfico principal: Canal Sindrômico ────────────────────────────────
function EndemicChannelChart({ channelData, year, overlayYears = [], logScale = false, ageGroupSeries = [], ageChannel = null }) {
  const chartData = useMemo(() => {
    if (!channelData) return [];
    // Use age-specific channel if provided
    const effectiveChannel = ageChannel || channelData;
    const { se_list } = channelData;
    const raw = effectiveChannel.raw;
    const channels = effectiveChannel.channels;
    const ch = channels[String(year)];
    if (!ch) return [];

    return se_list.map((se, i) => {
      const entry = { se, obs: raw[i]?.[`c${year}`] || 0 };

      if (logScale) {
        // Modo log: linhas individuais
        entry.p10 = Math.max(ch[i][0], 1);
        entry.p25 = Math.max(ch[i][1], 1);
        entry.p50 = Math.max(ch[i][2], 1);
        entry.p75 = Math.max(ch[i][3], 1);
        entry.p90 = Math.max(ch[i][4], 1);
        entry.obs = Math.max(entry.obs, 1);
      } else {
        // Modo linear: áreas empilhadas (bandas)
        entry.base = ch[i][0]; // P10
        entry.band1 = ch[i][1] - ch[i][0]; // P10→P25
        entry.band2 = ch[i][2] - ch[i][1]; // P25→P50
        entry.band3 = ch[i][3] - ch[i][2]; // P50→P75
        entry.band4 = ch[i][4] - ch[i][3]; // P75→P90
        entry.p50 = ch[i][2];
        entry.p90 = ch[i][4];
      }

      // Overlay anos
      overlayYears.forEach(oy => {
        entry[`ov${oy}`] = raw[i]?.[`c${oy}`] || 0;
        if (logScale) entry[`ov${oy}`] = Math.max(entry[`ov${oy}`], 1);
      });

      // Age group data
      ageGroupSeries.forEach(ags => {
        const pt = ags.data.find(p => p.se === se);
        entry[`age_${ags.name}`] = pt ? pt.value : 0;
        if (logScale) entry[`age_${ags.name}`] = Math.max(entry[`age_${ags.name}`], 1);
      });

      return entry;
    });
  }, [channelData, year, overlayYears, logScale, ageGroupSeries, ageChannel]);

  if (!chartData.length) return <div style={{ color: "#64748b" }}>Sem dados</div>;

  return (
    <ResponsiveContainer width="100%" height={380}>
      <ComposedChart data={chartData} margin={{ top: 5, right: 20, bottom: 5, left: 10 }}>
        <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.06)" />
        <XAxis dataKey="se" tick={{ fill: "#64748b", fontSize: 10 }}
               label={{ value: "Semana Epidemiológica", position: "insideBottom", offset: -2,
                        fill: "#64748b", fontSize: 11 }} />
        <YAxis tick={{ fill: "#64748b", fontSize: 10 }}
               scale={logScale ? "log" : "auto"} domain={logScale ? [1, "auto"] : [0, "auto"]}
               allowDecimals={false} />
        <Tooltip content={<CustomTooltip channelData={channelData} year={year} />} />

        {!logScale ? (
          <>
            <Area type="monotone" dataKey="base" stackId="ch" fill="transparent" stroke="none" />
            <Area type="monotone" dataKey="band1" stackId="ch" fill={BAND_COLORS[0]}
                  stroke="none" name="P10-P25" />
            <Area type="monotone" dataKey="band2" stackId="ch" fill={BAND_COLORS[1]}
                  stroke="none" name="P25-P50" />
            <Area type="monotone" dataKey="band3" stackId="ch" fill={BAND_COLORS[2]}
                  stroke="none" name="P50-P75" />
            <Area type="monotone" dataKey="band4" stackId="ch" fill={BAND_COLORS[3]}
                  stroke="none" name="P75-P90" />
          </>
        ) : (
          <>
            <Line type="monotone" dataKey="p10" stroke="#059669" strokeDasharray="4 4"
                  dot={false} name="Atividade mínima" strokeWidth={1} />
            <Line type="monotone" dataKey="p25" stroke="#2563eb" strokeDasharray="4 4"
                  dot={false} name="Zona normal (inferior)" strokeWidth={1} />
            <Line type="monotone" dataKey="p50" stroke="#d97706" strokeDasharray="4 4"
                  dot={false} name="Frequência esperada" strokeWidth={1.5} />
            <Line type="monotone" dataKey="p75" stroke="#ea580c" strokeDasharray="4 4"
                  dot={false} name="Zona normal (superior)" strokeWidth={1} />
            <Line type="monotone" dataKey="p90" stroke="#dc2626" strokeDasharray="4 4"
                  dot={false} name="Limite crítico" strokeWidth={1.5} />
          </>
        )}

        {!logScale && (
          <Line type="monotone" dataKey="p50" stroke="#d97706" strokeDasharray="6 3"
                dot={false} name="Mediana" strokeWidth={1.5} />
        )}

        <Line type="monotone" dataKey="obs" stroke="#fbbf24" strokeWidth={2.5}
              dot={{ fill: "#fbbf24", r: 2.5 }} name={`Observado ${year}`}
              activeDot={{ r: 5, fill: "#fbbf24" }} />

        {overlayYears.map(oy => (
          <Line key={oy} type="monotone" dataKey={`ov${oy}`}
                stroke={YEAR_COLORS[oy] || "#94a3b8"} strokeWidth={1.5}
                strokeDasharray="5 3" dot={false} name={`${oy}`} opacity={0.7} />
        ))}

        {ageGroupSeries.map(ags => (
          <Line key={`age-${ags.name}`} type="monotone" dataKey={`age_${ags.name}`}
                stroke={ags.color} strokeWidth={2} strokeDasharray="2 2"
                dot={{ r: 2, fill: ags.color }} name={ags.name} opacity={0.85} />
        ))}
      </ComposedChart>
    </ResponsiveContainer>
  );
}

// ── Gráfico de Exceedance ────────────────────────────────────────────
function ExceedanceChart({ channelData, year }) {
  const chartData = useMemo(() => {
    if (!channelData) return [];
    const { se_list, exceedance, classifications } = channelData;
    const exc = exceedance[String(year)];
    const clf = classifications[String(year)];
    if (!exc) return [];
    return se_list.map((se, i) => ({
      se, ratio: exc[i], zone: clf?.[i] || "seguranca",
    }));
  }, [channelData, year]);

  return (
    <ResponsiveContainer width="100%" height={180}>
      <BarChart data={chartData} margin={{ top: 5, right: 20, bottom: 5, left: 10 }}>
        <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.06)" />
        <XAxis dataKey="se" tick={{ fill: "#64748b", fontSize: 9 }} />
        <YAxis tick={{ fill: "#64748b", fontSize: 10 }}
               label={{ value: "Obs / P90", angle: -90, position: "insideLeft",
                        fill: "#64748b", fontSize: 10 }} />
        <ReferenceLine y={1} stroke="#ef4444" strokeDasharray="4 4" strokeWidth={1.5} />
        <Tooltip formatter={(v) => [v.toFixed(2), "Razão Obs/P90"]}
                 contentStyle={{ background: "rgba(15,12,41,0.95)",
                                 border: "1px solid rgba(255,255,255,0.15)",
                                 borderRadius: 8, fontSize: 12 }} />
        <Bar dataKey="ratio" name="Obs/P90">
          {chartData.map((entry, i) => (
            <Cell key={i} fill={ZONE_COLORS[entry.zone]?.fill || "#64748b"} />
          ))}
        </Bar>
      </BarChart>
    </ResponsiveContainer>
  );
}

// ── Legenda de zonas ─────────────────────────────────────────────────
function ZoneLegend() {
  return (
    <div style={{ display: "flex", gap: 12, flexWrap: "wrap", fontSize: 11 }}>
      {Object.entries(ZONE_COLORS).map(([key, z]) => (
        <div key={key} style={{ display: "flex", alignItems: "center", gap: 4 }}>
          <div style={{ width: 12, height: 12, borderRadius: 3, background: z.fill }} />
          <span style={{ color: "#94a3b8" }}>{z.label}</span>
        </div>
      ))}
      <div style={{ display: "flex", alignItems: "center", gap: 4, marginLeft: 8 }}>
        <div style={{ width: 20, height: 2, background: "#fbbf24" }} />
        <span style={{ color: "#94a3b8" }}>Observado</span>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
        <div style={{ width: 20, height: 2, background: "#d97706", borderTop: "2px dashed #d97706" }} />
        <span style={{ color: "#94a3b8" }}>Esperado</span>
      </div>
    </div>
  );

function BoletimTab() {
  const prioridadeCor = {"ALTA": "#ef4444", "MODERADA": "#f59e0b", "BAIXA": "#22c55e"};
  const prioridadeBg = {"ALTA": "rgba(239,68,68,0.15)", "MODERADA": "rgba(245,158,11,0.15)", "BAIXA": "rgba(34,197,94,0.15)"};
  const zonaCor = {"sucesso": "#22c55e", "seguranca": "#3b82f6", "alerta": "#f59e0b", "epidemico": "#f97316", "emergencia": "#ef4444"};
  const zonaNome = {"sucesso": "Sucesso", "seguranca": "Segurança", "alerta": "Alerta", "epidemico": "Epidêmico", "emergencia": "Emergência"};
  const [expandido, setExpandido] = useState(null);

  // ── Helpers de calendário epidemiológico (regra ISO/SINAN/MS) ──
  // SE01 = semana cujo domingo contém 04/jan (domingo=dia 1, sábado=dia 7)
  // Uma SE é COMPLETA apenas após seu sábado de encerramento ter passado.
  // Retorna: { seEmCurso, seUltimaCompleta, diasDecorridos, seStartDate, seEndDate }
  const calcularSeEpi = (dataRef) => {
    const hoje = dataRef || new Date();
    const ano = hoje.getFullYear();
    const jan4 = new Date(ano, 0, 4);
    // jan4.getDay(): domingo=0, segunda=1, ..., sábado=6
    // Domingo da semana de jan4 = jan4 - jan4.getDay() dias
    const se1 = new Date(jan4.getTime() - jan4.getDay() * 86400000);
    const diasDesdeSe1 = Math.floor((hoje - se1) / 86400000);
    const seEmCurso = Math.floor(diasDesdeSe1 / 7) + 1;
    const diasDecorridos = (diasDesdeSe1 % 7) + 1; // 1=domingo, 7=sábado
    const seStart = new Date(se1.getTime() + (seEmCurso - 1) * 7 * 86400000);
    const seEnd = new Date(seStart.getTime() + 6 * 86400000);
    // SE completa: hoje > sábado da SE em curso
    const seUltimaCompleta = hoje > seEnd ? seEmCurso : seEmCurso - 1;
    return { seEmCurso, seUltimaCompleta, diasDecorridos, seStart, seEnd, ano };

      {(() => {

        const ordemStatus = ["emergencia", "epidemico", "alerta", "seguranca", "sucesso"];
        const statusLabel = {
          emergencia: "EMERGÊNCIA",
          epidemico:  "EPIDÊMICO",
          alerta:     "ALERTA",

          epidemico:  "#f97316",
          alerta:     "#f59e0b",
          seguranca:  "#3b82f6",
          sucesso:    "#22c55e",
        };

        // Hierarquia de severidade das zonas (para operador "pior zona")
        const zonaRank = { sucesso: 0, seguranca: 1, alerta: 2, epidemico: 3, emergencia: 4 };
        const rankToZona = ["sucesso", "seguranca", "alerta", "epidemico", "emergencia"];
        const piorZona = (zonas) => {
          if (!zonas || zonas.length === 0) return "sucesso";
          return rankToZona[Math.max(...zonas.map(z => zonaRank[z] ?? 0))];
        };

        // Parâmetros de janela (padrão Fiocruz/InfoGripe)
        const JANELA_STATUS = 2;   // nível de atividade: últimas 2 SEs
        const JANELA_CP = 3;        // tendência curto prazo: últimas 3 SEs
        const JANELA_LP = 6;        // tendência longo prazo: últimas 6 SEs

        // Classificador de tendência: compara média das últimas N SEs vs N SEs anteriores
        // Retorna "cresc" / "queda" / "estavel" / null (dados insuficientes)
        const tendencia = (obsArr, janela) => {
          if (!obsArr || obsArr.length < 2 * janela) return null;
          const ultN = obsArr.slice(-janela);
          const antN = obsArr.slice(-2 * janela, -janela);
          const mediaUlt = ultN.reduce((s, v) => s + v, 0) / janela;
          const mediaAnt = antN.reduce((s, v) => s + v, 0) / janela;
          if (mediaAnt === 0) return mediaUlt > 0 ? "cresc" : "estavel";
          const delta = (mediaUlt - mediaAnt) / mediaAnt;
          if (delta >= 0.10) return "cresc";
          if (delta <= -0.10) return "queda";
          return "estavel";
        };

        // Para cada item: recontar zonas 2026 APENAS de SEs observadas (mesma lógica do Quadro Resumo)
        // + computar status Fiocruz (pior zona últimas 2 SEs) + tendências CP/LP
        const itensEnriquecidos = BOLETIM_DATA.map(item => {
          const ch = DATA.channels[item.name];
          // seN = última SE COMPLETA (exclui SE parcial que não fechou)
          const seN = Math.min(item.se_2026 || 0, seAnalise);
          let zonas_seq = [];
          let obs_seq = [];
          if (ch && ch.classifications && ch.classifications["2026"]) {
            zonas_seq = ch.classifications["2026"].slice(0, seN);
          }
          if (ch && ch.raw) {
            // Série observada de 2026 até a última SE COMPLETA (ordem cronológica)
            obs_seq = ch.raw
              .filter(r => r.se <= seN)
              .sort((a, b) => a.se - b.se)
              .map(r => r.c2026 || r["c2026"] || 0);
          }
          // Total 2026 YTD somente de SEs COMPLETAS (exclui parcial)
          const total_2026_completo = obs_seq.reduce((s, v) => s + v, 0);
          const zonas_2026_cls = { sucesso: 0, seguranca: 0, alerta: 0, epidemico: 0, emergencia: 0 };
          zonas_seq.forEach(z => { if (z in zonas_2026_cls) zonas_2026_cls[z]++; });
          const sesCriticas2026 = zonas_2026_cls.epidemico + zonas_2026_cls.emergencia;

          // Status Fiocruz: pior zona das últimas 2 SEs COMPLETAS (não usa SE parcial)
          const ultimasJanela = zonas_seq.slice(-JANELA_STATUS);
          const status_fiocruz = piorZona(ultimasJanela);

          // Tendências (padrão InfoGripe: CP=3 SEs, LP=6 SEs — só SEs completas)
          const trend_cp = tendencia(obs_seq, JANELA_CP);
          const trend_lp = tendencia(obs_seq, JANELA_LP);

          // Média semanal 2026 — recalculada só com SEs completas
          const media_semanal_2026_comp = obs_seq.length > 0
            ? (total_2026_completo / obs_seq.length).toFixed(1)
            : 0;

          // Var% YTD (2026 vs P50 de 2025 nas mesmas SEs COMPLETAS)
          let var_ytd = null;
          if (ch && ch.channels && ch.channels["2025"] && seN > 0) {
            const p50_ytd = ch.channels["2025"].slice(0, seN).reduce((s, r) => s + (r[2] || 0), 0);
            if (p50_ytd > 0) var_ytd = ((total_2026_completo - p50_ytd) / p50_ytd) * 100;
          }
          return { ...item, zonas_2026_cls, sesCriticas2026, var_ytd_p50: var_ytd,
                   status_fiocruz, ultimasJanela, trend_cp, trend_lp,
                   total_2026_completo, seN_analise: seN,
                   media_semanal_2026_comp };
        });

        // Agrupar por STATUS FIOCRUZ (pior zona das últimas 2 SEs)
        const gruposPorStatus = {};
        ordemStatus.forEach(s => { gruposPorStatus[s] = []; });
        itensEnriquecidos.forEach(it => {
          const z = it.status_fiocruz || "sucesso";
          if (!(z in gruposPorStatus)) gruposPorStatus[z] = [];
          gruposPorStatus[z].push(it);
        });

        // Cor da variação % (mesma regra do Quadro Resumo, para consistência)
        const varColor2 = (v) => v == null ? "#64748b"
          : v >= 25 ? "#ef4444"
          : v >= 10 ? "#f59e0b"
          : v <= -25 ? "#22c55e"
          : v <= -10 ? "#3b82f6"
          : "#94a3b8";

        // Renderiza um card de agravo (layout único para todos os status)
        const renderCardAgravo = (item, i, corStatus) => {
          // Zona âncora = status Fiocruz (pior das últimas 2 SEs), NÃO a última SE isolada
          const zona = item.status_fiocruz;
          const zonaUltimaSe = item.ultima_se_zona;
          const zonaNomeAtual = zonaNome[zona] || zona;
          const zonaCorAtual = zonaCor[zona] || "#94a3b8";
          const prioCor = prioridadeCor[item.prioridade] || "#94a3b8";

          // Helper: rótulo + emoji + cor para tendência CP/LP
          const trendDisplay = (t) => {
            if (t === "cresc")  return { label: "crescimento", emoji: "↗", cor: "#ef4444" };
            if (t === "queda")  return { label: "queda",       emoji: "↘", cor: "#22c55e" };
            if (t === "estavel")return { label: "estável",     emoji: "→", cor: "#94a3b8" };
            return { label: "sem dados", emoji: "·", cor: "#64748b" };
          };
          const cp = trendDisplay(item.trend_cp);
          const lp = trendDisplay(item.trend_lp);

          // Emoji por zona para mostrar as últimas 2 SEs
          const zonaEmojiCard = { sucesso: "🟢", seguranca: "🔵", alerta: "🟡", epidemico: "🟠", emergencia: "🔴" };

          return (
            <div key={i} style={{
              ...cardStyle,
              borderLeft: `3px solid ${corStatus}`,
              background: `${corStatus}08`,
              marginBottom: 12
            }}>
              {/* Header: nome + badge STATUS FIOCRUZ (âncora) */}
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start",
                marginBottom: 10, gap: 12, flexWrap: "wrap" }}>
                <div style={{ flex: 1, minWidth: 200 }}>
                  <div style={{ fontSize: 15, fontWeight: 700 }}>{item.name}</div>
                  {/* Linha de contexto histórico discreta */}
                  <div style={{ fontSize: 10, color: "#64748b", marginTop: 2 }}>
                    Contexto histórico 2025:
                    <span style={{ color: prioCor, fontWeight: 600, marginLeft: 4 }}>
                      prio {item.prioridade}
                    </span>
                    {" · "}{item.variacao_pct > 0 ? "+" : ""}{item.variacao_pct}% vs média 22-24
                    {" · "}pico SE{item.pico_se_2025}
                  </div>
                </div>
                {/* Badge principal = STATUS FIOCRUZ (pior das últimas 2 SEs) */}
                <span title={`Status Fiocruz: pior zona nas últimas ${JANELA_STATUS} SEs (${item.ultimasJanela.map(z=>zonaNome[z]||z).join(" · ")})`}
                  style={{
                  padding: "5px 12px", borderRadius: 6, fontSize: 11, fontWeight: 700,
                  background: `${zonaCorAtual}22`, color: zonaCorAtual,
                  border: `1px solid ${zonaCorAtual}55`, whiteSpace: "nowrap"
                }}>
                  {zonaNomeAtual.toUpperCase()} · SE{item.seN_analise}
                </span>
              </div>

              {/* Tira Fiocruz: nível de atividade (últimas 2 SEs) + CP (3 SEs) + LP (6 SEs) */}
              <div style={{ display: "flex", gap: 12, marginBottom: 10, flexWrap: "wrap",
                background: "rgba(255,255,255,0.02)", padding: "8px 12px", borderRadius: 8,
                border: "1px solid rgba(255,255,255,0.05)" }}>
                <div style={{ fontSize: 11, color: "#94a3b8" }}>
                  <b style={{ color: "#cbd5e1" }}>Nível de atividade</b>
                  <span style={{ fontSize: 9, color: "#64748b" }}> (últ. 2 SEs)</span>:{" "}
                  <span style={{ letterSpacing: 2 }}>
                    {item.ultimasJanela.map((z, idx) => (
                      <span key={idx} title={zonaNome[z]}>{zonaEmojiCard[z] || "·"}</span>
                    ))}
                  </span>
                  {zonaUltimaSe !== zona && (
                    <span style={{ fontSize: 9, color: "#64748b", marginLeft: 4 }}>
                      · últ. SE isolada: <span style={{ color: zonaCor[zonaUltimaSe] }}>{zonaNome[zonaUltimaSe]}</span>
                    </span>
                  )}
                </div>
                <div style={{ fontSize: 11, color: "#94a3b8" }}>
                  <b style={{ color: "#cbd5e1" }}>Tendência CP</b>
                  <span style={{ fontSize: 9, color: "#64748b" }}> (3 SEs)</span>:{" "}
                  <span style={{ color: cp.cor, fontWeight: 600 }}>{cp.emoji} {cp.label}</span>
                </div>
                <div style={{ fontSize: 11, color: "#94a3b8" }}>
                  <b style={{ color: "#cbd5e1" }}>Tendência LP</b>
                  <span style={{ fontSize: 9, color: "#64748b" }}> (6 SEs)</span>:{" "}
                  <span style={{ color: lp.cor, fontWeight: 600 }}>{lp.emoji} {lp.label}</span>
                </div>
              </div>

              {/* Tendência histórica 2025 (descrição textual, em tom neutro) */}
              <div style={{ fontSize: 12, color: "#94a3b8", lineHeight: 1.6, marginBottom: 12,
                fontStyle: "italic" }}>
                Tendência 2025: {item.tendencia}
              </div>

              {/* Cards numéricos: 2026 dominante à esquerda, 2025 como contexto à direita */}
              <div style={{ display: "grid", gridTemplateColumns: "1.3fr 1fr 1fr", gap: 8, marginBottom: 12 }}>
                {/* Card 1 (DOMINANTE): 2026 — somente SEs completas */}
                <div style={{
                  background: `${zonaCorAtual}15`,
                  border: `1px solid ${zonaCorAtual}33`,
                  borderRadius: 8, padding: "10px 12px"
                }}>
                  <div style={{ fontSize: 10, color: zonaCorAtual, textTransform: "uppercase",
                    fontWeight: 700, letterSpacing: 0.5 }}>
                    2026 YTD (SE 1–{item.seN_analise})
                  </div>
                  <div style={{ fontSize: 20, fontWeight: 700, fontFamily: "JetBrains Mono, monospace",
                    color: zonaCorAtual }}
                    title={sePartialExists ? `SE ${sePartial} em curso foi excluída (dados parciais)` : null}>
                    {item.total_2026_completo.toLocaleString("pt-BR")}
                  </div>
                  <div style={{ fontSize: 10, color: "#94a3b8", lineHeight: 1.4 }}>
                    {item.media_semanal_2026_comp}/sem · Pico {(item.pico_val_2026||0).toLocaleString("pt-BR")} SE{item.pico_se_2026}
                    <br/>
                    Últ. SE completa (SE{item.seN_analise}): obs {item.ultima_se_obs} vs P50 {item.ultima_se_p50}, P90 {item.ultima_se_p90}
                  </div>
                </div>

                {/* Card 2: Alertas 2026 */}
                <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 8, padding: "10px 12px" }}>
                  <div style={{ fontSize: 10, color: "#94a3b8", textTransform: "uppercase" }}>
                    Alertas 2026
                  </div>
                  <div style={{ fontSize: 18, fontWeight: 700, fontFamily: "JetBrains Mono, monospace",
                    color: item.sesCriticas2026 > 0 ? "#f97316" : "#22c55e" }}>
                    {item.sesCriticas2026}
                  </div>
                  <div style={{ fontSize: 10, color: "#64748b" }}>
                    SEs Ep/Em · Var P50: <b style={{ color: varColor2(item.var_ytd_p50) }}>
                      {item.var_ytd_p50 != null
                        ? `${item.var_ytd_p50 > 0 ? "+" : ""}${item.var_ytd_p50.toFixed(1)}%`
                        : "—"}
                    </b>
                  </div>
                </div>

                {/* Card 3: Histórico 2025 (DISCRETO) */}
                <div style={{ background: "rgba(255,255,255,0.02)", borderRadius: 8, padding: "10px 12px",
                  border: "1px dashed rgba(255,255,255,0.08)" }}>
                  <div style={{ fontSize: 10, color: "#64748b", textTransform: "uppercase" }}>
                    2025 completo
                  </div>
                  <div style={{ fontSize: 14, fontWeight: 600, fontFamily: "JetBrains Mono, monospace",
                    color: "#94a3b8" }}>
                    {item.total_2025.toLocaleString("pt-BR")}
                  </div>
                  <div style={{ fontSize: 10, color: "#64748b" }}>
                    {item.se_p90_2025} SEs {">"}P90 · Sazon. SE{item.pico_se_2025}
                  </div>
                </div>
              </div>

              {/* Classificação 2026 (observado) em destaque, 2025 em tom discreto abaixo */}
              <div style={{ marginBottom: 8 }}>
                <div style={{ fontSize: 11, color: "#e2e8f0", marginBottom: 4, fontWeight: 600 }}>
                  Classificação semanal 2026 ({item.seN_analise} SEs completas)
                  {sePartialExists && (
                    <span style={{ fontSize: 9, color: "#64748b", marginLeft: 6 }}>
                      · SE{sePartial} em curso (excluída)
                    </span>
                  )}
                </div>
                <ZonaBar cls={item.zonas_2026_cls} totalSEs={52} seCompleta={item.seN_analise} />
              </div>

              <details style={{ marginBottom: 10 }}>
                <summary style={{ fontSize: 10, color: "#64748b", cursor: "pointer",
                  userSelect: "none", padding: "4px 0" }}>
                  ▸ Ver classificação 2025 completa (contexto histórico)
                </summary>
                <div style={{ marginTop: 6, opacity: 0.7 }}>
                  <ZonaBar cls={item.classificacao_2025} totalSEs={52} seCompleta={52} />
                </div>
              </details>

              <div style={{ fontSize: 12, color: "#818cf8", background: "rgba(129,140,248,0.08)",
                padding: "8px 12px", borderRadius: 8 }}>
                <b>Ação recomendada:</b> {item.acao}
              </div>
            </div>
          );
        };

        return (
          <div style={cardStyle}>
            {sectionTitle("4. Análise por Agravo — Status Fiocruz (últimas 2 SEs)")}
            <p style={{ color: "#94a3b8", fontSize: 12, margin: "0 0 16px", lineHeight: 1.6 }}>
              Agravos agrupados pelo <b>nível de atividade</b> (pior zona nas últimas 2 SEs observadas, padrão
              InfoGripe/Fiocruz). Cada card mostra também as tendências de <b>curto prazo</b> (3 SEs) e
              <b> longo prazo</b> (6 SEs). A prioridade histórica 2025 aparece como contexto discreto.
            </p>

            {ordemStatus.map(status => {
              const itens = gruposPorStatus[status];
              if (!itens || itens.length === 0) return null;
              const cor = statusCor[status];
              return (
                <div key={status} style={{ marginBottom: 20 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: cor, marginBottom: 10,
                    display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ background: `${cor}22`, padding: "3px 10px", borderRadius: 6,
                      fontSize: 11, fontWeight: 700, border: `1px solid ${cor}44` }}>
                      {statusLabel[status]} · {itens.length} agravo{itens.length > 1 ? "s" : ""}
                    </span>
                  </div>
                  {itens.map((item, i) => renderCardAgravo(item, i, cor))}
                </div>
              );
            })}
          </div>
        );
      })()}

      {/* ═══ 4. Nota Metodológica ═══ */}
      <div style={{ ...cardStyle, fontSize: 12, color: "#94a3b8", lineHeight: 1.8 }}>
        {sectionTitle("5. Nota Metodológica")}
        <p style={{ margin: "0 0 10px", color: "#cbd5e1" }}>
          <b style={{ color: "#e2e8f0" }}>Modelo :</b> Para cada semana epidemiológica (SE),
          o número de casos segue X ~ Poisson(λ·e), com λ ~ Gamma(a, b) como prior. A marginalização resulta
          em X ~ Binomial Negativa, capturando a sobredispersão típica de dados epidemiológicos.
        </p>
        <p style={{ margin: "0 0 10px", color: "#cbd5e1" }}>
          <b style={{ color: "#e2e8f0" }}>Leave-one-out:</b> O canal de cada ano monitorado é estimado
          excluindo-se aquele ano da base histórica, garantindo que os limiares são genuinamente preditivos.
        </p>
        <p style={{ margin: "0 0 10px", color: "#cbd5e1" }}>
          <b style={{ color: "#e2e8f0" }}>Classificação em 5 zonas:</b> Os percentis probabilidade de ocorrência na semana epidemiológica
          da distribuição preditiva definem as zonas Sucesso (≤P25), Segurança (P25–P50), Alerta (P50–P75),
          Epidêmico (P75–P90) e Emergência ({">"}P90).
        </p>
        <p style={{ margin: "0 0 10px", color: "#cbd5e1" }}>
          <b style={{ color: "#e2e8f0" }}>Canais por faixa etária:</b> Para os 20 agravos prioritários,
          canais sindrômicos individuais foram calculados para 6 faixas etárias (Bebês, Crianças, Adolescentes,
          Adultos jovens, Meia-idade e Idosos), permitindo análise estratificada no dashboard interativo.
        </p>
        <div style={{ borderTop: "1px solid rgba(255,255,255,0.06)", paddingTop: 10, marginTop: 10 }}>
          <p style={{ margin: 0, fontSize: 11, color: "#64748b" }}>
            Fonte: IDS Saúde (Relatório 187) · Município: Rio Claro/SP ·
            Elaborado pela Vigilância Epidemiológica, Fundação Municipal de Saúde ·
            Atualização: segundas-feiras às 8h · Extração automática diária às 3h
          </p>
        </div>
      </div>
    </div>
  );
}

function App() {
  const agravos = Object.keys(DATA.channels);
  const [selectedAgravo, setSelectedAgravo] = useState(agravos[0]);
  const [selectedYear, setSelectedYear] = useState(null);
  const [overlayYears, setOverlayYears] = useState([]);
  const [logScale, setLogScale] = useState(false);
  const [categoryFilter, setCategoryFilter] = useState("capitulos");
  const [activeTab, setActiveTab] = useState("boletim");
  const [activeAgeGroups, setActiveAgeGroups] = useState([]);
  const [sinExpanded, setSinExpanded] = useState(false);

  const channelData = DATA.channels[selectedAgravo];
  const years = channelData?.years || [];
  const year = selectedYear || years[years.length - 1];
  const kpi = channelData?.kpis?.[String(year)] || {};

  const filteredAgravos = useMemo(() => {
    return CATEGORIES[categoryFilter] || agravos;
  }, [categoryFilter, agravos]);

  const toggleAgeGroup = (ag) => {
    setActiveAgeGroups(prev =>
      prev.includes(ag) ? prev.filter(x => x !== ag) : [...prev, ag]
    );
  };

  // Build age group series for the selected agravo + year
  const ageGroupSeries = useMemo(() => {
    if (activeAgeGroups.length === 0) return [];
    const agData = AGE_GROUP_DATA[selectedAgravo];
    if (!agData) return [];
    const series = [];
    for (const ag of activeAgeGroups) {
      if (!agData[ag]) continue;
      const yearData = agData[ag][String(year)];
      if (!yearData) continue;
      const points = [];
      for (let se = 1; se <= 52; se++) {
        points.push({ se, value: yearData[String(se)] || 0 });
      }
      series.push({ name: ag, color: AGE_COLORS[ag], data: points });
    }
    return series;
  }, [selectedAgravo, year, activeAgeGroups]);

  // When exactly 1 age group is active and age channel data exists, use age-specific channel
  const ageChannel = useMemo(() => {
    if (activeAgeGroups.length !== 1) return null;
    const ag = activeAgeGroups[0];
    const agCh = AGE_CHANNELS[selectedAgravo];
    if (!agCh || !agCh[ag]) return null;
    return agCh[ag];
  }, [selectedAgravo, activeAgeGroups]);

  const toggleOverlay = (y) => {
    setOverlayYears(prev =>
      prev.includes(y) ? prev.filter(x => x !== y) : [...prev, y]
    );
  };

  const cardStyle = {
    background: "rgba(255,255,255,0.03)",
    borderRadius: 14, padding: 20,
    border: "1px solid rgba(255,255,255,0.06)",
    marginBottom: 16,
  };

  return (
    <div style={{
      fontFamily: "DM Sans, sans-serif",
      background: "linear-gradient(135deg, #0c0a1f 0%, #1a1040 50%, #0f172a 100%)",
      minHeight: "100vh", color: "#e2e8f0", padding: "24px 20px",
    }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

      {/* Header */}
      <div style={{ textAlign: "center", marginBottom: 28 }}>
        <h1 style={{
          fontSize: 28, fontWeight: 700, margin: 0,
          background: "linear-gradient(90deg, #818cf8, #c084fc, #f472b6)",
          WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
        }}>
          Sala de Situação / CIEVS — FMS Rio Claro/SP
        </h1>
        <p style={{ color: "#94a3b8", fontSize: 13, margin: "6px 0 0" }}>
          Vigilância Epidemiológica e Informação em Saúde · FMS Rio Claro/SP
        </p>
        {/* Tab navigation */}
        <div style={{ display: "flex", gap: 0, marginTop: 20, justifyContent: "center" }}>
          {[["boletim", "Situação Atual"], ["dashboard", "Canal Sindrômico"], ["cids_prioritarios", "CIDs Prioritários"], ["notificacao", "Notificação Compulsória"]].map(([key, label]) => (
            <button key={key} onClick={() => {
              const defaults = {dashboard: "capitulos", cids_prioritarios: "secaoA", notificacao: "imediata", boletim: null};
              const cat = defaults[key];
              if (cat) { setCategoryFilter(cat); setSelectedAgravo(CATEGORIES[cat].find(a => DATA.channels[a]) || CATEGORIES[cat][0]); }
              setSelectedYear(null); setOverlayYears([]); setActiveAgeGroups([]); setSinExpanded(false);
              setActiveTab(key);
            }} style={{
              padding: "10px 28px", border: "none", cursor: "pointer",
              fontSize: 13, fontWeight: 600, fontFamily: "DM Sans, sans-serif",
              background: activeTab === key ? "rgba(129,140,248,0.2)" : "transparent",
              color: activeTab === key ? "#818cf8" : "#64748b",
              borderBottom: activeTab === key ? "2px solid #818cf8" : "2px solid transparent",
              transition: "all 0.2s",
            }}>{label}</button>
          ))}
        </div>
      </div>

      {activeTab === "boletim" ? <BoletimTab /> : activeTab === "boletins_hist" ? <BoletinsHistorico /> : <>

      {/* Filtro de categoria — varia por aba */}
      {activeTab === "cids_prioritarios" ? (
        <div>
          <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap", justifyContent: "center" }}>
            {[
              ["secaoA", "Seção A — Clínicos"],
              ["secaoB", "Seção B — Sentinelas"],
            ].map(([key, label]) => (
              <button key={key} onClick={() => { setCategoryFilter(key); setSelectedAgravo(CATEGORIES[key].find(a => DATA.channels[a]) || CATEGORIES[key][0]); setSelectedYear(null); setOverlayYears([]); setActiveAgeGroups([]); }} style={{
                padding: "8px 18px", borderRadius: 10, border: "none", cursor: "pointer",
                fontSize: 13, fontWeight: 600, fontFamily: "DM Sans, sans-serif",
                background: categoryFilter === key ? "rgba(129,140,248,0.3)" : "rgba(255,255,255,0.06)",

              }}>{label}</button>
            ))}
            <button onClick={() => { setSinExpanded(v => !v); }} style={{
              padding: "8px 18px", borderRadius: 10, border: "none", cursor: "pointer",

              background: sinExpanded ? "rgba(129,140,248,0.3)" : "rgba(255,255,255,0.06)",

          </div>
          {sinExpanded && (
            <div style={{ display: "flex", gap: 6, marginBottom: 8, flexWrap: "wrap", justifyContent: "center", padding: "8px", background: "rgba(255,255,255,0.03)", borderRadius: 10 }}>
              {CATEGORIES["sindromes_col"].map(a => (
                <button key={a} onClick={() => { setCategoryFilter("sindromes_col"); setSelectedAgravo(a); setSelectedYear(null); setOverlayYears([]); }} style={{
                  padding: "5px 12px", borderRadius: 8, border: "none", cursor: "pointer",
                  fontSize: 11, fontFamily: "DM Sans, sans-serif",
                  background: selectedAgravo === a ? "rgba(99,102,241,0.3)" : "rgba(255,255,255,0.04)",
                  color: selectedAgravo === a ? "#a5b4fc" : "#94a3b8",
                  border: selectedAgravo === a ? "1px solid rgba(99,102,241,0.5)" : "1px solid rgba(255,255,255,0.06)",
                }}>{a.length > 40 ? a.substring(0, 37) + "..." : a}</button>
              ))}

          )}
        </div>
      ) : activeTab === "notificacao" ? (
        <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap", justifyContent: "center" }}>
          {[
            ["imediata", "⚡ Imediata (24h)"],
            ["semanal", "📋 Semanal (7 dias)"],
          ].map(([key, label]) => (
            <button key={key} onClick={() => { setCategoryFilter(key); setSelectedAgravo(CATEGORIES[key].find(a => DATA.channels[a]) || CATEGORIES[key][0]); setSelectedYear(null); setOverlayYears([]); setActiveAgeGroups([]); }} style={{
              padding: "8px 18px", borderRadius: 10, border: "none", cursor: "pointer",
              fontSize: 13, fontWeight: 600, fontFamily: "DM Sans, sans-serif",
              background: categoryFilter === key ? "rgba(129,140,248,0.3)" : "rgba(255,255,255,0.06)",
              color: categoryFilter === key ? "#818cf8" : "#94a3b8",
            }}>{label}</button>
          ))}
        </div>
      ) : (
        <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap", justifyContent: "center" }}>
          {[
            ["capitulos", "Capítulos CID"],
            ["cids", "CIDs Individuais"],
            ["sindromes", "Síndromes"],
          ].map(([key, label]) => (
            <button key={key} onClick={() => { setCategoryFilter(key); setSelectedAgravo(CATEGORIES[key][0]); setSelectedYear(null); setOverlayYears([]); setActiveAgeGroups([]); }} style={{
              padding: "8px 18px", borderRadius: 10, border: "none", cursor: "pointer",
              fontSize: 13, fontWeight: 600, fontFamily: "DM Sans, sans-serif",
              background: categoryFilter === key ? "rgba(129,140,248,0.3)" : "rgba(255,255,255,0.06)",
              color: categoryFilter === key ? "#818cf8" : "#94a3b8",
            }}>{label}</button>
          ))}
        </div>
      )}

      {/* Sub-botões dos agravos — ocultar quando sinExpanded ativo (evita duplicação) */}
      {!(activeTab === "cids_prioritarios" && sinExpanded) && (
      <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap", justifyContent: "center" }}>
        {filteredAgravos.map(a => (
          <button key={a} onClick={() => { setSelectedAgravo(a); setSelectedYear(null); setOverlayYears([]); }} style={{
            padding: "5px 12px", borderRadius: 8, border: "none", cursor: "pointer",
            fontSize: 11, fontFamily: "DM Sans, sans-serif",
            background: selectedAgravo === a ? "rgba(99,102,241,0.3)" : "rgba(255,255,255,0.04)",
            color: selectedAgravo === a ? "#a5b4fc" : "#94a3b8",
            border: selectedAgravo === a ? "1px solid rgba(99,102,241,0.5)" : "1px solid rgba(255,255,255,0.06)",
          }}>{a.length > 40 ? a.substring(0, 37) + "..." : a}</button>
        ))}
      </div>
      )}

      {/* Sem dados para agravo selecionado */}
      {!channelData && (
        <div style={{ textAlign: "center", padding: "48px 24px", color: "#64748b" }}>
          <div style={{ fontSize: 32, marginBottom: 12 }}>📊</div>
          <div style={{ fontSize: 15, fontWeight: 600, color: "#94a3b8" }}>Sem dados disponíveis</div>
          <div style={{ fontSize: 12, marginTop: 6 }}>Canal sindrômico ainda não computado para <b style={{color:"#818cf8"}}>{selectedAgravo}</b></div>
          <div style={{ fontSize: 11, marginTop: 4, color: "#475569" }}>Será disponibilizado na próxima execução do pipeline.</div>
        </div>
      )}

      {/* Seleção de ano + overlay */}
      <div style={{ display: channelData ? "flex" : "none", gap: 6, marginBottom: 12, flexWrap: "wrap", alignItems: "center" }}>
        <span style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: 1 }}>
          Ano:
        </span>
        {years.map(y => (
          <button key={y} onClick={() => setSelectedYear(y)} style={{
            padding: "4px 10px", borderRadius: 6, border: "none", cursor: "pointer",
            fontSize: 11, fontFamily: "JetBrains Mono, monospace",
            background: y === year ? "rgba(251,191,36,0.25)" : "rgba(255,255,255,0.04)",
            color: y === year ? "#fbbf24" : "#94a3b8",
            fontWeight: y === year ? 700 : 400,
          }}>{y}</button>
        ))}
        <span style={{ fontSize: 11, color: "#64748b", marginLeft: 12, textTransform: "uppercase", letterSpacing: 1 }}>
          Sobrepor:
        </span>
        {years.filter(y2 => y2 !== year).map(y => (
          <button key={y} onClick={() => toggleOverlay(y)} style={{
            padding: "4px 10px", borderRadius: 6, border: "none", cursor: "pointer",
            fontSize: 11, fontFamily: "JetBrains Mono, monospace",
            background: overlayYears.includes(y) ? "rgba(255,255,255,0.15)" : "rgba(255,255,255,0.04)",
            color: YEAR_COLORS[y] || "#94a3b8",
            opacity: overlayYears.includes(y) ? 1 : 0.5,
          }}>{y}</button>
        ))}
        <button onClick={() => setLogScale(!logScale)} style={{
          marginLeft: "auto", padding: "4px 10px", borderRadius: 6,
          border: "none", cursor: "pointer", fontSize: 11,
          background: logScale ? "rgba(234,88,12,0.3)" : "rgba(255,255,255,0.06)",
          color: logScale ? "#f97316" : "#94a3b8",
          fontFamily: "JetBrains Mono, monospace",
        }}>{logScale ? "LOG" : "LIN"}</button>
      </div>

      {/* Faixa etária */}
      <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap", alignItems: "center" }}>
        <span style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: 1 }}>
          Faixa etária:
        </span>
        {activeAgeGroups.length === 1 && AGE_CHANNELS[selectedAgravo]?.[activeAgeGroups[0]] && (
          <span style={{ fontSize: 10, color: "#818cf8", fontStyle: "italic" }}>
            (canal específico ativo)
          </span>
        )}
        <button onClick={() => {
          setActiveAgeGroups(prev => prev.length === AGE_GROUPS.length ? [] : [...AGE_GROUPS]);
        }} style={{
          padding: "4px 10px", borderRadius: 6, border: "none", cursor: "pointer",
          fontSize: 11, fontWeight: 700, fontFamily: "JetBrains Mono, monospace",
          background: activeAgeGroups.length === AGE_GROUPS.length ? "rgba(129,140,248,0.3)" : "rgba(255,255,255,0.06)",
          color: activeAgeGroups.length === AGE_GROUPS.length ? "#818cf8" : "#94a3b8",
        }}>TODAS</button>
        {AGE_GROUPS.map(ag => (
          <button key={ag} onClick={() => toggleAgeGroup(ag)} style={{
            padding: "4px 10px", borderRadius: 6, border: "none", cursor: "pointer",
            fontSize: 11, fontFamily: "JetBrains Mono, monospace",
            background: activeAgeGroups.includes(ag) ? "rgba(255,255,255,0.15)" : "rgba(255,255,255,0.04)",
            color: AGE_COLORS[ag] || "#94a3b8",
            opacity: activeAgeGroups.includes(ag) ? 1 : 0.5,
          }}>{ag}</button>
        ))}
      </div>

      {/* KPI Cards */}
      <div style={{ display: "flex", gap: 12, marginBottom: 16, flexWrap: "wrap" }}>
        <KpiCard label="Total do ano" value={kpi.total || 0} color="#60a5fa" />
        <KpiCard label="Pico" value={kpi.pico || 0} sub={`SE ${kpi.pico_se || "?"}`}
                 color="#f472b6" />
        <KpiCard label="SEs em zona crítica" value={kpi.se_acima_p90 || 0}
                 sub={`de ${channelData?.se_list?.length || 52}`}
                 color={kpi.se_acima_p90 > 10 ? "#ef4444" : "#34d399"} />
      </div>

      {/* Heatmap multi-ano (sempre visível) */}
      <div style={cardStyle}>
        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>
          Mapa de Calor — Classificação Semanal ({Math.max(years[0], years[years.length-1]-5)}–{years[years.length-1]})
        </div>
        <MultiYearHeatmap
          classifications={channelData?.classifications || {}}
          seList={channelData?.se_list || []}
          years={years}
          raw={channelData?.raw || []}
          currentYear={years[years.length - 1]}
        />
        <div style={{ marginTop: 10 }}><ZoneLegend /></div>
      </div>

      {/* Canal Sindrômico */}
      <div style={cardStyle}>
        <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 8 }}>
          Canal Sindrômico — {selectedAgravo}
          {ageChannel && <span style={{
            fontSize: 11, fontWeight: 500, marginLeft: 12,
            background: "rgba(129,140,248,0.2)", color: "#a5b4fc",
            padding: "3px 10px", borderRadius: 6,
          }}>Canal: {activeAgeGroups[0]}</span>}
        </div>
        <EndemicChannelChart channelData={channelData} year={year}
                             overlayYears={overlayYears} logScale={logScale}  ageGroupSeries={ageGroupSeries} ageChannel={ageChannel} />
      </div>

      {/* Exceedance */}
      <div style={cardStyle}>
        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 4 }}>
          Excedência Semanal (Observado vs Limite Crítico) — {year}
        </div>
        <ExceedanceChart channelData={channelData} year={year} />
      </div>

      {/* Metodologia */}
      <div style={{ ...cardStyle, fontSize: 12, color: "#94a3b8", lineHeight: 1.7 }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: "#e2e8f0", marginBottom: 8 }}>
          Metodologia
        </div>
        <p style={{ margin: "0 0 8px" }}>
          <b>Modelo :</b> Para cada semana epidemiológica (SE),
          o número de casos segue X ~ Poisson(λ·e), com λ ~ Gamma(a, b) como prior.
          A marginalização resulta em X ~ Binomial Negativa, capturando a sobredispersão
          típica de dados epidemiológicos.
        </p>
        <p style={{ margin: "0 0 8px" }}>
          <b>Leave-one-out:</b> O canal de cada ano monitorado é estimado excluindo-se
          aquele ano da base histórica, garantindo que os limiares são genuinamente preditivos.
        </p>
        <p style={{ margin: "0 0 8px" }}>
          <b>Classificação em 5 zonas:</b> Percentis probabilidade de ocorrência na semana epidemiológica da distribuição
          preditiva definem as zonas Sucesso (≤P25), Segurança (P25–P50), Alerta (P50–P75),
          Epidêmico (P75–P90) e Emergência ({">"}P90).
        </p>
        <p style={{ margin: "0 0 4px", fontSize: 11, color: "#64748b" }}>
          Base histórica: 2022–2025 · Ano monitorado: 2026 · Monte Carlo: 30.000 amostras/SE
        </p>
        <p style={{ margin: 0, fontSize: 11, color: "#64748b" }}>
          Dados: IDS Saúde (Relatório 187) · Município: Rio Claro/SP · Vigilância Epidemiológica, Fundação Municipal de Saúde
        </p>
      </div>

      </>}
    </div>
  );
}


function BoletinsHistorico() {
  const [manifest, setManifest] = React.useState(null);
  const [erro, setErro] = React.useState(null);
  React.useEffect(() => {
    fetch('boletins/manifest.json')
      .then(r => { if (!r.ok) throw new Error('sem boletins'); return r.json(); })
      .then(data => setManifest(data))
      .catch(e => setErro(e.message));
  }, []);
  const meses = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  const fmtD = (iso) => {
    if (!iso) return "—";
    const d = new Date(iso + "T12:00:00");
    return `${String(d.getDate()).padStart(2,"0")}/${meses[d.getMonth()]}/${d.getFullYear()}`;
  };
  const cardStyle = { background:"rgba(255,255,255,0.03)", borderRadius:14, padding:20,
    border:"1px solid rgba(255,255,255,0.06)", marginBottom:16 };
  if (!manifest && !erro) return <div style={{textAlign:"center",padding:"48px",color:"#64748b"}}>⏳ Carregando boletins…</div>;
  return (
    <div style={{maxWidth:760,margin:"0 auto"}}>
      <div style={{...cardStyle, background:"linear-gradient(135deg,rgba(99,102,241,0.1),rgba(168,85,247,0.1))"}}>
        <div style={{fontSize:11,color:"#818cf8",textTransform:"uppercase",letterSpacing:2,marginBottom:6}}>
          Sala de Situação / CIEVS · FMS Rio Claro/SP
        </div>
        <h2 style={{fontSize:20,fontWeight:700,margin:"0 0 4px",
          background:"linear-gradient(90deg,#818cf8,#c084fc)",
          WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>
          Boletins Sindrômicos — Acervo
        </h2>
        <p style={{color:"#94a3b8",fontSize:13,margin:0}}>
          Boletins semanais de atendimentos sindrômicos nas UPAs · Gerados automaticamente a cada ciclo de dados.
        </p>
      </div>
      <div style={cardStyle}>
        {(erro || !manifest || manifest.length === 0) ? (
          <div style={{color:"#64748b",fontSize:13,textAlign:"center",padding:"32px 0"}}>
            <div style={{fontSize:36,marginBottom:12}}>📋</div>
            <div style={{fontWeight:600,color:"#94a3b8",marginBottom:8}}>Nenhum boletim disponível ainda</div>
            <div style={{fontSize:12,lineHeight:1.8}}>Os boletins são gerados automaticamente a cada atualização do pipeline.<br/>O primeiro estará disponível após o próximo ciclo de execução.</div>
          </div>
        ) : (
          <>
          <div style={{fontSize:13,fontWeight:700,color:"#e2e8f0",marginBottom:16,
            borderBottom:"2px solid rgba(129,140,248,0.3)",paddingBottom:8}}>
            {manifest.length} boletim{manifest.length!==1?"s":""} disponíveis
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {manifest.map((b,i) => (
              <a key={b.arquivo} href={`boletins/${b.arquivo}`} target="_blank" rel="noopener noreferrer"
                style={{textDecoration:"none"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                  padding:"12px 16px",borderRadius:10,
                  background:i===0?"rgba(99,102,241,0.12)":"rgba(255,255,255,0.03)",
                  border:i===0?"1px solid rgba(99,102,241,0.4)":"1px solid rgba(255,255,255,0.06)",
                  cursor:"pointer"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <span style={{fontSize:22}}>📄</span>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:14,fontWeight:700,color:"#e2e8f0"}}>
                          SE {String(b.se).padStart(2,"0")}/{b.ano}
                        </span>
                        {i===0 && <span style={{fontSize:10,background:"#6366f1",color:"#fff",
                          padding:"1px 7px",borderRadius:4,fontWeight:700}}>ATUAL</span>}
                      </div>
                      <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>
                        {fmtD(b.data_inicio)} a {fmtD(b.data_fim)}
                        {b.gerado_em && ` · Gerado em ${fmtD(b.gerado_em)}`}
                      </div>
                      <div style={{fontSize:10,color:"#64748b",marginTop:1,fontFamily:"monospace"}}>
                        {b.arquivo}
                      </div>
                    </div>
                  </div>
                  <span style={{fontSize:12,color:"#818cf8",fontWeight:600}}>⬇ Baixar PDF</span>
                </div>
              </a>
            ))}
          </div>
          </>
        )}
      </div>
      <div style={{...cardStyle,fontSize:12,color:"#94a3b8",lineHeight:1.8}}>
        Documentos PDF gerados automaticamente a cada atualização semanal.
        Para consulta interativa dos canais sindrômicos, utilize as abas{" "}
        <b style={{color:"#818cf8"}}>Canais Sindrômicos</b> e <b style={{color:"#818cf8"}}>Situação Atual</b>.
      </div>
    </div>
  );
}

(async () => {
  const root = document.getElementById('root');
  root.innerHTML = `
    <div style="min-height:100vh;display:flex;align-items:center;
                justify-content:center;background:#0c0a1f;">
      <div style="color:#a5b4fc;font-family:'DM Sans',sans-serif;
                  font-size:1.1rem;text-align:center;">
        ⏳ Carregando dados…
      </div>
    </div>`;

  try {
    [DATA, AGE_GROUP_DATA, AGE_CHANNELS, BOLETIM_DATA] = await Promise.all([
      fetch('channel_data.json').then(r => { if (!r.ok) throw new Error(r.statusText); return r.json(); }),
      fetch('age_group_data.json').then(r => { if (!r.ok) throw new Error(r.statusText); return r.json(); }),
      fetch('age_channels.json').then(r => { if (!r.ok) throw new Error(r.statusText); return r.json(); }),
      fetch('boletim_data.json').then(r => { if (!r.ok) throw new Error(r.statusText); return r.json(); }),
    ]);
    ReactDOM.render(<App />, root);
  } catch (err) {
    root.innerHTML = `
      <div style="min-height:100vh;display:flex;align-items:center;
                  justify-content:center;background:#0c0a1f;">
        <div style="color:#ef4444;font-family:'DM Sans',sans-serif;padding:2rem;text-align:center;">
          ❌ Erro ao carregar dados: ${err.message}<br/>
          <small style="color:#94a3b8">Verifique se channel_data.json, age_group_data.json,
          age_channels.json e boletim_data.json estão na mesma pasta que index.html.</small>
        </div>
      </div>`;
  }
})();

</script>
</body>
