const ZONE_COLORS = {
  sucesso:    { bg: "#064e3b", fg: "#34d399", label: "Sucesso",    fill: "#059669" },
  seguranca:  { bg: "#1e3a5f", fg: "#60a5fa", label: "Segurança",  fill: "#2563eb" },
  alerta:     { bg: "#78350f", fg: "#fbbf24", label: "Alerta",     fill: "#d97706" },
  epidemico:  { bg: "#7c2d12", fg: "#f97316", label: "Epidêmico",  fill: "#ea580c" },
  emergencia: { bg: "#7f1d1d", fg: "#ef4444", label: "Emergência", fill: "#dc2626" },
};

const YEAR_COLORS = {
  2021: "#6ee7b7", 2022: "#94a3b8", 2023: "#a78bfa",
  2024: "#38bdf8", 2025: "#f472b6", 2026: "#fbbf24",
};

const BAND_COLORS = [
  "rgba(5,150,105,0.25)",   // P10-P25 (sucesso)
  "rgba(37,99,235,0.25)",   // P25-P50 (segurança)
  "rgba(217,119,6,0.20)",   // P50-P75 (alerta)
  "rgba(234,88,12,0.20)",   // P75-P90 (epidêmico)
];

// ── Componentes auxiliares ───────────────────────────────────────────

function KpiCard({ label, value, sub, color = "#60a5fa" }) {
  return (
    <div style={{
      background: "rgba(255,255,255,0.04)",
      borderRadius: 12, padding: "14px 18px",
      border: "1px solid rgba(255,255,255,0.08)",
      minWidth: 140, flex: 1,
    }}>
      <div style={{ fontSize: 11, color: "#94a3b8", textTransform: "uppercase",
                    letterSpacing: 1, fontFamily: "DM Sans, sans-serif" }}>{label}</div>
      <div style={{ fontSize: 28, fontWeight: 700, color,
                    fontFamily: "JetBrains Mono, monospace", marginTop: 2 }}>
        {typeof value === "number" ? value.toLocaleString("pt-BR") : value}
      </div>
      {sub && <div style={{ fontSize: 11, color: "#64748b", marginTop: 2 }}>{sub}</div>}
    </div>
  );
}

function ZoneBadge({ zone }) {
  const z = ZONE_COLORS[zone] || ZONE_COLORS.seguranca;
  return (
    <span style={{
      background: z.bg, color: z.fg, padding: "2px 8px",
      borderRadius: 6, fontSize: 11, fontWeight: 600,
      fontFamily: "DM Sans, sans-serif",
    }}>{z.label}</span>
  );
}

// ── Heatmap multi-ano (últimos 5 anos + corrente, sempre visível) ────
function MultiYearHeatmap({ classifications, seList, years, raw, currentYear }) {
  // Últimos 5 anos + corrente
  const displayYears = years.slice(-6);

  // Detectar última SE com dados para o ano corrente
  const lastSeWithData = {};
  displayYears.forEach(y => {
    let lastSe = 0;
    seList.forEach((se, i) => {
      const obs = raw?.[i]?.[`c${y}`];
      if (obs != null && obs > 0) lastSe = se;
    });
    lastSeWithData[y] = lastSe;
  });

  return (
    <div style={{ overflowX: "auto" }}>
      {/* Header SE numbers */}
      <div style={{ display: "flex", alignItems: "flex-end", marginBottom: 2 }}>
        <div style={{ width: 52, minWidth: 52, fontSize: 10, color: "#64748b", textAlign: "right", paddingRight: 6 }}>SE</div>
        <div style={{ display: "flex", gap: 1 }}>
          {seList.map(se => (
            <div key={`h-${se}`} style={{
              width: 14, textAlign: "center", fontSize: 8, color: "#64748b",
              fontFamily: "JetBrains Mono, monospace",
            }}>
              {se % 4 === 0 ? se : ""}
            </div>
          ))}
        </div>
      </div>

      {/* Rows per year */}
      {displayYears.map(y => {
        const clf = classifications[String(y)];
        const isCurrentYear = y === currentYear;
        const lastSe = lastSeWithData[y] || 52;

        return (
          <div key={y} style={{ display: "flex", alignItems: "center", marginBottom: 2 }}>
            <div style={{
              width: 52, minWidth: 52, fontSize: 11, textAlign: "right", paddingRight: 6,
              fontFamily: "JetBrains Mono, monospace", fontWeight: isCurrentYear ? 700 : 400,
              color: isCurrentYear ? "#fbbf24" : "#94a3b8",
            }}>
              {y}{isCurrentYear ? " ★" : ""}
            </div>
            <div style={{ display: "flex", gap: 1 }}>
              {seList.map((se, i) => {
                const zone = clf?.[i] || null;
                const obs = raw?.[i]?.[`c${y}`];
                const hasData = obs != null && obs > 0;
                const isFuture = isCurrentYear && se > lastSe;

                if (!zone || isFuture) {
                  return (
                    <div key={`${y}-${se}`} style={{
                      width: 14, height: 18, borderRadius: 2,
                      background: "rgba(255,255,255,0.03)",
                      border: "1px solid rgba(255,255,255,0.04)",
                    }} title={`SE ${se}/${y}: sem dados`} />
                  );
                }

                const z = ZONE_COLORS[zone];
                return (
                  <div key={`${y}-${se}`} title={`SE ${se}/${y}: ${z.label} (${obs || 0} casos)`} style={{
                    width: 14, height: 18, borderRadius: 2,
                    background: z.fill,
                    opacity: hasData ? 0.9 : 0.3,
                    border: isCurrentYear ? "1px solid rgba(251,191,36,0.3)" : "1px solid transparent",
                    cursor: "default",
                    transition: "transform 0.1s",
                  }}
                  onMouseEnter={e => e.target.style.transform = "scale(1.4)"}
                  onMouseLeave={e => e.target.style.transform = "scale(1)"}
                  />
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// Manter versão single-year para compatibilidade
function ClassificationHeatmap({ classifications, seList, year }) {
  const clf = classifications[String(year)];
  if (!clf) return null;
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 2, marginTop: 8 }}>
      {seList.map((se, i) => {
        const zone = clf[i] || "seguranca";
        const z = ZONE_COLORS[zone];
        return (
          <div key={se} title={`SE ${se}: ${z.label}`} style={{
            width: 16, height: 24, borderRadius: 3,
            background: z.fill, opacity: 0.85,
            display: "flex", alignItems: "flex-end", justifyContent: "center",
          }}>
            {se % 5 === 0 && (
              <span style={{ fontSize: 7, color: "rgba(255,255,255,0.6)" }}>{se}</span>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── Tooltip personalizado ────────────────────────────────────────────
function CustomTooltip({ active, payload, label, channelData, year }) {
  if (!active || !payload || !payload.length) return null;
  const se = label;
  const seIdx = (channelData?.se_list || []).indexOf(se);
  const ch = channelData?.channels?.[String(year)]?.[seIdx];
  const clf = channelData?.classifications?.[String(year)]?.[seIdx];
  const obs = channelData?.raw?.[seIdx]?.[`c${year}`];

  return (
    <div style={{
      background: "rgba(15,12,41,0.95)", border: "1px solid rgba(255,255,255,0.15)",
      borderRadius: 10, padding: 12, fontSize: 12, color: "#e2e8f0",
      fontFamily: "DM Sans, sans-serif", backdropFilter: "blur(8px)",
      maxWidth: 280,
    }}>
      <div style={{ fontWeight: 700, marginBottom: 6, fontSize: 13 }}>SE {se}</div>
      {obs != null && (
        <div style={{ marginBottom: 4 }}>
          Observado: <b style={{ color: "#fbbf24" }}>{obs.toLocaleString("pt-BR")}</b>
          {clf && <> — <ZoneBadge zone={clf} /></>}
        </div>
      )}
      {ch && (
        <div style={{ fontSize: 11, color: "#94a3b8", lineHeight: 1.6 }}>
          P10: {ch[0]} · P25: {ch[1]} · P50: {ch[2]}<br />
          P75: {ch[3]} · P90: {ch[4]}
        </div>
      )}
    </div>
  );
}

// ── Gráfico principal: Canal Endêmico ────────────────────────────────
function EndemicChannelChart({ channelData, year, overlayYears = [], logScale = false, ageGroupSeries = [], ageChannel = null }) {
  const chartData = useMemo(() => {
    if (!channelData) return [];
    // Use age-specific channel if provided
    const effectiveChannel = ageChannel || channelData;
    const { se_list } = channelData;
    const raw = effectiveChannel.raw;
    const channels = effectiveChannel.channels;
    const ch = channels[String(year)];
    if (!ch) return [];

    return se_list.map((se, i) => {
      const entry = { se, obs: raw[i]?.[`c${year}`] || 0 };

      if (logScale) {
        // Modo log: linhas individuais
        entry.p10 = Math.max(ch[i][0], 1);
        entry.p25 = Math.max(ch[i][1], 1);
        entry.p50 = Math.max(ch[i][2], 1);
        entry.p75 = Math.max(ch[i][3], 1);
        entry.p90 = Math.max(ch[i][4], 1);
        entry.obs = Math.max(entry.obs, 1);
      } else {
        // Modo linear: áreas empilhadas (bandas)
        entry.base = ch[i][0]; // P10
        entry.band1 = ch[i][1] - ch[i][0]; // P10→P25
        entry.band2 = ch[i][2] - ch[i][1]; // P25→P50
        entry.band3 = ch[i][3] - ch[i][2]; // P50→P75
        entry.band4 = ch[i][4] - ch[i][3]; // P75→P90
        entry.p50 = ch[i][2];
        entry.p90 = ch[i][4];
      }

      // Overlay anos
      overlayYears.forEach(oy => {
        entry[`ov${oy}`] = raw[i]?.[`c${oy}`] || 0;
        if (logScale) entry[`ov${oy}`] = Math.max(entry[`ov${oy}`], 1);
      });

      // Age group data
      ageGroupSeries.forEach(ags => {
        const pt = ags.data.find(p => p.se === se);
        entry[`age_${ags.name}`] = pt ? pt.value : 0;
        if (logScale) entry[`age_${ags.name}`] = Math.max(entry[`age_${ags.name}`], 1);
      });

      return entry;
    });
  }, [channelData, year, overlayYears, logScale, ageGroupSeries, ageChannel]);

  if (!chartData.length) return <div style={{ color: "#64748b" }}>Sem dados</div>;

  return (
    <ResponsiveContainer width="100%" height={380}>
      <ComposedChart data={chartData} margin={{ top: 5, right: 20, bottom: 5, left: 10 }}>
        <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.06)" />
        <XAxis dataKey="se" tick={{ fill: "#64748b", fontSize: 10 }}
               label={{ value: "Semana Epidemiológica", position: "insideBottom", offset: -2,
                        fill: "#64748b", fontSize: 11 }} />
        <YAxis tick={{ fill: "#64748b", fontSize: 10 }}
               scale={logScale ? "log" : "auto"} domain={logScale ? [1, "auto"] : [0, "auto"]}
               allowDecimals={false} />
        <Tooltip content={<CustomTooltip channelData={channelData} year={year} />} />

        {!logScale ? (
          <>
            <Area type="monotone" dataKey="base" stackId="ch" fill="transparent" stroke="none" />
            <Area type="monotone" dataKey="band1" stackId="ch" fill={BAND_COLORS[0]}
                  stroke="none" name="P10-P25" />
            <Area type="monotone" dataKey="band2" stackId="ch" fill={BAND_COLORS[1]}
                  stroke="none" name="P25-P50" />
            <Area type="monotone" dataKey="band3" stackId="ch" fill={BAND_COLORS[2]}
                  stroke="none" name="P50-P75" />
            <Area type="monotone" dataKey="band4" stackId="ch" fill={BAND_COLORS[3]}
                  stroke="none" name="P75-P90" />
          </>
        ) : (
          <>
            <Line type="monotone" dataKey="p10" stroke="#059669" strokeDasharray="4 4"
                  dot={false} name="P10" strokeWidth={1} />
            <Line type="monotone" dataKey="p25" stroke="#2563eb" strokeDasharray="4 4"
                  dot={false} name="P25" strokeWidth={1} />
            <Line type="monotone" dataKey="p50" stroke="#d97706" strokeDasharray="4 4"
                  dot={false} name="P50" strokeWidth={1.5} />
            <Line type="monotone" dataKey="p75" stroke="#ea580c" strokeDasharray="4 4"
                  dot={false} name="P75" strokeWidth={1} />
            <Line type="monotone" dataKey="p90" stroke="#dc2626" strokeDasharray="4 4"
                  dot={false} name="P90" strokeWidth={1.5} />
          </>
        )}

        {!logScale && (
          <Line type="monotone" dataKey="p50" stroke="#d97706" strokeDasharray="6 3"
                dot={false} name="Mediana (P50)" strokeWidth={1.5} />
        )}

        <Line type="monotone" dataKey="obs" stroke="#fbbf24" strokeWidth={2.5}
              dot={{ fill: "#fbbf24", r: 2.5 }} name={`Observado ${year}`}
              activeDot={{ r: 5, fill: "#fbbf24" }} />

        {overlayYears.map(oy => (
          <Line key={oy} type="monotone" dataKey={`ov${oy}`}
                stroke={YEAR_COLORS[oy] || "#94a3b8"} strokeWidth={1.5}
                strokeDasharray="5 3" dot={false} name={`${oy}`} opacity={0.7} />
        ))}

        {ageGroupSeries.map(ags => (
          <Line key={`age-${ags.name}`} type="monotone" dataKey={`age_${ags.name}`}
                stroke={ags.color} strokeWidth={2} strokeDasharray="2 2"
                dot={{ r: 2, fill: ags.color }} name={ags.name} opacity={0.85} />
        ))}
      </ComposedChart>
    </ResponsiveContainer>
  );
}

// ── Gráfico de Exceedance ────────────────────────────────────────────
function ExceedanceChart({ channelData, year }) {
  const chartData = useMemo(() => {
    if (!channelData) return [];
    const { se_list, exceedance, classifications } = channelData;
    const exc = exceedance[String(year)];
    const clf = classifications[String(year)];
    if (!exc) return [];
    return se_list.map((se, i) => ({
      se, ratio: exc[i], zone: clf?.[i] || "seguranca",
    }));
  }, [channelData, year]);

  return (
    <ResponsiveContainer width="100%" height={180}>
      <BarChart data={chartData} margin={{ top: 5, right: 20, bottom: 5, left: 10 }}>
        <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.06)" />
        <XAxis dataKey="se" tick={{ fill: "#64748b", fontSize: 9 }} />
        <YAxis tick={{ fill: "#64748b", fontSize: 10 }}
               label={{ value: "Obs / P90", angle: -90, position: "insideLeft",
                        fill: "#64748b", fontSize: 10 }} />
        <ReferenceLine y={1} stroke="#ef4444" strokeDasharray="4 4" strokeWidth={1.5} />
        <Tooltip formatter={(v) => [v.toFixed(2), "Razão Obs/P90"]}
                 contentStyle={{ background: "rgba(15,12,41,0.95)",
                                 border: "1px solid rgba(255,255,255,0.15)",
                                 borderRadius: 8, fontSize: 12 }} />
        <Bar dataKey="ratio" name="Obs/P90">
          {chartData.map((entry, i) => (
            <Cell key={i} fill={ZONE_COLORS[entry.zone]?.fill || "#64748b"} />
          ))}
        </Bar>
      </BarChart>
    </ResponsiveContainer>
  );
}

function BoletimTab() {
  const prioridadeCor = {"ALTA": "#ef4444", "MODERADA": "#f59e0b", "BAIXA": "#22c55e"};
  const prioridadeBg = {"ALTA": "rgba(239,68,68,0.15)", "MODERADA": "rgba(245,158,11,0.15)", "BAIXA": "rgba(34,197,94,0.15)"};
  const zonaCor = {"sucesso": "#22c55e", "seguranca": "#3b82f6", "alerta": "#f59e0b", "epidemico": "#f97316", "emergencia": "#ef4444"};
  const zonaNome = {"sucesso": "Sucesso", "seguranca": "Segurança", "alerta": "Alerta", "epidemico": "Epidêmico", "emergencia": "Emergência"};
  const [expandido, setExpandido] = useState(null);

  const downloadDocx = () => {
    const byteChars = atob(DOCX_B64);
    const byteNumbers = new Array(byteChars.length);
    for (let i = 0; i < byteChars.length; i++) byteNumbers[i] = byteChars.charCodeAt(i);
    const byteArray = new Uint8Array(byteNumbers);
    const blob = new Blob([byteArray], {type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "boletim_epidemiologico_semanal.docx";
    a.click();
    URL.revokeObjectURL(url);
  };

  const cardStyle = {
    background: "rgba(255,255,255,0.03)",
    borderRadius: 14, padding: 20,
    border: "1px solid rgba(255,255,255,0.06)",
    marginBottom: 16,
  };

  const sectionTitle = (text) => (
    <div style={{ fontSize: 16, fontWeight: 700, color: "#e2e8f0", marginBottom: 12,
      borderBottom: "2px solid rgba(129,140,248,0.3)", paddingBottom: 8 }}>
      {text}
    </div>
  );

  const ZonaBar = ({cls, label}) => {
    if (!cls) return null;
    const total = Object.values(cls).reduce((a,b) => a+b, 0);
    if (total === 0) return null;
    const zones = ["sucesso","seguranca","alerta","epidemico","emergencia"];

function App() {
  const agravos = Object.keys(DATA.channels);
  const [selectedAgravo, setSelectedAgravo] = useState(agravos[0]);

  const [logScale, setLogScale] = useState(false);
  const [categoryFilter, setCategoryFilter] = useState("capitulos");
  const [activeTab, setActiveTab] = useState("dashboard");
  const [activeAgeGroups, setActiveAgeGroups] = useState([]);

  const channelData = DATA.channels[selectedAgravo];
  const years = channelData?.years || [];
  const year = selectedYear || years[years.length - 1];
  const kpi = channelData?.kpis?.[String(year)] || {};

  const filteredAgravos = useMemo(() => {
    return CATEGORIES[categoryFilter] || agravos;
  }, [categoryFilter, agravos]);

  const toggleAgeGroup = (ag) => {
    setActiveAgeGroups(prev =>
      prev.includes(ag) ? prev.filter(x => x !== ag) : [...prev, ag]
    );
  };

  // Build age group series for the selected agravo + year
  const ageGroupSeries = useMemo(() => {
    if (activeAgeGroups.length === 0) return [];
    const agData = AGE_GROUP_DATA[selectedAgravo];
    if (!agData) return [];
    const series = [];
    for (const ag of activeAgeGroups) {
      if (!agData[ag]) continue;
      const yearData = agData[ag][String(year)];
      if (!yearData) continue;
      const points = [];
      for (let se = 1; se <= 52; se++) {
        points.push({ se, value: yearData[String(se)] || 0 });
      }
      series.push({ name: ag, color: AGE_COLORS[ag], data: points });
    }
    return series;
  }, [selectedAgravo, year, activeAgeGroups]);

  // When exactly 1 age group is active and age channel data exists, use age-specific channel
  const ageChannel = useMemo(() => {
    if (activeAgeGroups.length !== 1) return null;
    const ag = activeAgeGroups[0];
    const agCh = AGE_CHANNELS[selectedAgravo];
    if (!agCh || !agCh[ag]) return null;
    return agCh[ag];
  }, [selectedAgravo, activeAgeGroups]);

  const toggleOverlay = (y) => {
    setOverlayYears(prev =>
      prev.includes(y) ? prev.filter(x => x !== y) : [...prev, y]
    );
  };

  const cardStyle = {
    background: "rgba(255,255,255,0.03)",
    borderRadius: 14, padding: 20,
    border: "1px solid rgba(255,255,255,0.06)",
    marginBottom: 16,
  };

  return (
    <div style={{
      fontFamily: "DM Sans, sans-serif",
      background: "linear-gradient(135deg, #0c0a1f 0%, #1a1040 50%, #0f172a 100%)",
      minHeight: "100vh", color: "#e2e8f0", padding: "24px 20px",
    }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

      {/* Header */}
      <div style={{ textAlign: "center", marginBottom: 28 }}>
        <h1 style={{
          fontSize: 28, fontWeight: 700, margin: 0,
          background: "linear-gradient(90deg, #818cf8, #c084fc, #f472b6)",
          WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent",
        }}>
          Canal Endêmico Bayesiano
        </h1>
        <p style={{ color: "#94a3b8", fontSize: 13, margin: "6px 0 0" }}>
          Vigilância Epidemiológica — UPAs Rio Claro, SP · Modelo Gamma-Poisson Hierárquico
        </p>
        {/* Tab navigation */}
        <div style={{ display: "flex", gap: 0, marginTop: 20, justifyContent: "center" }}>
          {[["dashboard", "Dashboard"], ["boletim", "Boletim Semanal"]].map(([key, label]) => (
            <button key={key} onClick={() => setActiveTab(key)} style={{
              padding: "10px 28px", border: "none", cursor: "pointer",
              fontSize: 13, fontWeight: 600, fontFamily: "DM Sans, sans-serif",
              background: activeTab === key ? "rgba(129,140,248,0.2)" : "transparent",
              color: activeTab === key ? "#818cf8" : "#64748b",
              borderBottom: activeTab === key ? "2px solid #818cf8" : "2px solid transparent",
              transition: "all 0.2s",
            }}>{label}</button>
          ))}
        </div>
      </div>

      {activeTab === "boletim" ? <BoletimTab /> : <>

      {/* Filtro de categoria */}
      <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap", justifyContent: "center" }}>
        {[
          ["capitulos", "Capítulos CID"],
          ["cids", "CIDs Individuais"],
          ["sindromes", "Síndromes"],
        ].map(([key, label]) => (
          <button key={key} onClick={() => { setCategoryFilter(key); setSelectedAgravo(CATEGORIES[key][0]); setSelectedYear(null); setOverlayYears([]); setActiveAgeGroups([]); }} style={{
            padding: "8px 18px", borderRadius: 10, border: "none", cursor: "pointer",
            fontSize: 13, fontWeight: 600, fontFamily: "DM Sans, sans-serif",
            background: categoryFilter === key ? "rgba(129,140,248,0.3)" : "rgba(255,255,255,0.06)",
            color: categoryFilter === key ? "#818cf8" : "#94a3b8",
          }}>{label}</button>
        ))}
      </div>

      {/* Sub-botões dos agravos */}
      <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap", justifyContent: "center" }}>
        {filteredAgravos.map(a => (
          <button key={a} onClick={() => { setSelectedAgravo(a); setSelectedYear(null); setOverlayYears([]); }} style={{
            padding: "5px 12px", borderRadius: 8, border: "none", cursor: "pointer",
            fontSize: 11, fontFamily: "DM Sans, sans-serif",
            background: selectedAgravo === a ? "rgba(99,102,241,0.3)" : "rgba(255,255,255,0.04)",
            color: selectedAgravo === a ? "#a5b4fc" : "#94a3b8",
            border: selectedAgravo === a ? "1px solid rgba(99,102,241,0.5)" : "1px solid rgba(255,255,255,0.06)",
          }}>{a.length > 40 ? a.substring(0, 37) + "..." : a}</button>
        ))}
      </div>

      {/* Seleção de ano + overlay */}
      <div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap", alignItems: "center" }}>
        <span style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: 1 }}>
          Ano:
        </span>
        {years.map(y => (
          <button key={y} onClick={() => setSelectedYear(y)} style={{
            padding: "4px 10px", borderRadius: 6, border: "none", cursor: "pointer",
            fontSize: 11, fontFamily: "JetBrains Mono, monospace",
            background: y === year ? "rgba(251,191,36,0.25)" : "rgba(255,255,255,0.04)",
            color: y === year ? "#fbbf24" : "#94a3b8",
            fontWeight: y === year ? 700 : 400,
          }}>{y}</button>
        ))}
        <span style={{ fontSize: 11, color: "#64748b", marginLeft: 12, textTransform: "uppercase", letterSpacing: 1 }}>
          Sobrepor:
        </span>
        {years.filter(y2 => y2 !== year).map(y => (
          <button key={y} onClick={() => toggleOverlay(y)} style={{
            padding: "4px 10px", borderRadius: 6, border: "none", cursor: "pointer",
            fontSize: 11, fontFamily: "JetBrains Mono, monospace",
            background: overlayYears.includes(y) ? "rgba(255,255,255,0.15)" : "rgba(255,255,255,0.04)",
            color: YEAR_COLORS[y] || "#94a3b8",
            opacity: overlayYears.includes(y) ? 1 : 0.5,
          }}>{y}</button>
        ))}
        <button onClick={() => setLogScale(!logScale)} style={{
          marginLeft: "auto", padding: "4px 10px", borderRadius: 6,
          border: "none", cursor: "pointer", fontSize: 11,
          background: logScale ? "rgba(234,88,12,0.3)" : "rgba(255,255,255,0.06)",
          color: logScale ? "#f97316" : "#94a3b8",
          fontFamily: "JetBrains Mono, monospace",
        }}>{logScale ? "LOG" : "LIN"}</button>
      </div>

      {/* Faixa etária */}
      <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap", alignItems: "center" }}>
        <span style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: 1 }}>
          Faixa etária:
        </span>
        {activeAgeGroups.length === 1 && AGE_CHANNELS[selectedAgravo]?.[activeAgeGroups[0]] && (
          <span style={{ fontSize: 10, color: "#818cf8", fontStyle: "italic" }}>
            (canal específico ativo)
          </span>
        )}
        <button onClick={() => {
          setActiveAgeGroups(prev => prev.length === AGE_GROUPS.length ? [] : [...AGE_GROUPS]);
        }} style={{
          padding: "4px 10px", borderRadius: 6, border: "none", cursor: "pointer",
          fontSize: 11, fontWeight: 700, fontFamily: "JetBrains Mono, monospace",
          background: activeAgeGroups.length === AGE_GROUPS.length ? "rgba(129,140,248,0.3)" : "rgba(255,255,255,0.06)",
          color: activeAgeGroups.length === AGE_GROUPS.length ? "#818cf8" : "#94a3b8",
        }}>TODAS</button>
        {AGE_GROUPS.map(ag => (
          <button key={ag} onClick={() => toggleAgeGroup(ag)} style={{
            padding: "4px 10px", borderRadius: 6, border: "none", cursor: "pointer",
            fontSize: 11, fontFamily: "JetBrains Mono, monospace",
            background: activeAgeGroups.includes(ag) ? "rgba(255,255,255,0.15)" : "rgba(255,255,255,0.04)",
            color: AGE_COLORS[ag] || "#94a3b8",
            opacity: activeAgeGroups.includes(ag) ? 1 : 0.5,
          }}>{ag}</button>
        ))}
      </div>

      {/* KPI Cards */}
      <div style={{ display: "flex", gap: 12, marginBottom: 16, flexWrap: "wrap" }}>
        <KpiCard label="Total do ano" value={kpi.total || 0} color="#60a5fa" />
        <KpiCard label="Pico" value={kpi.pico || 0} sub={`SE ${kpi.pico_se || "?"}`}
                 color="#f472b6" />
        <KpiCard label="SE acima P90" value={kpi.se_acima_p90 || 0}
                 sub={`de ${channelData?.se_list?.length || 52}`}
                 color={kpi.se_acima_p90 > 10 ? "#ef4444" : "#34d399"} />
      </div>

      {/* Heatmap multi-ano (sempre visível) */}
      <div style={cardStyle}>
        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>
          Mapa de Calor — Classificação Semanal ({Math.max(years[0], years[years.length-1]-5)}–{years[years.length-1]})
        </div>
        <MultiYearHeatmap
          classifications={channelData?.classifications || {}}
          seList={channelData?.se_list || []}
          years={years}
          raw={channelData?.raw || []}
          currentYear={years[years.length - 1]}
        />
        <div style={{ marginTop: 10 }}><ZoneLegend /></div>
      </div>

      {/* Canal Endêmico */}
      <div style={cardStyle}>
        <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 8 }}>
          Canal Endêmico — {selectedAgravo}
          {ageChannel && <span style={{
            fontSize: 11, fontWeight: 500, marginLeft: 12,
            background: "rgba(129,140,248,0.2)", color: "#a5b4fc",
            padding: "3px 10px", borderRadius: 6,
          }}>Canal: {activeAgeGroups[0]}</span>}
        </div>
        <EndemicChannelChart channelData={channelData} year={year}
                             overlayYears={overlayYears} logScale={logScale}  ageGroupSeries={ageGroupSeries} ageChannel={ageChannel} />
      </div>

      {/* Exceedance */}
      <div style={cardStyle}>
        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 4 }}>
          Razão de Exceedance (Observado / P90) — {year}
        </div>
        <ExceedanceChart channelData={channelData} year={year} />
      </div>

      {/* Metodologia */}
      <div style={{ ...cardStyle, fontSize: 12, color: "#94a3b8", lineHeight: 1.7 }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: "#e2e8f0", marginBottom: 8 }}>
          Metodologia
        </div>
        <p style={{ margin: "0 0 8px" }}>
          <b>Modelo hierárquico Gamma-Poisson:</b> Para cada semana epidemiológica (SE),
          o número de casos segue X ~ Poisson(λ·e), com λ ~ Gamma(a, b) como prior.
          A marginalização resulta em X ~ Binomial Negativa, capturando a sobredispersão
          típica de dados epidemiológicos.
        </p>
        <p style={{ margin: "0 0 8px" }}>
          <b>Leave-one-out:</b> O canal de cada ano monitorado é estimado excluindo-se
          aquele ano da base histórica, garantindo que os limiares são genuinamente preditivos.
        </p>
        <p style={{ margin: "0 0 8px" }}>
          <b>Classificação em 5 zonas:</b> Percentis P10, P25, P50, P75 e P90 da distribuição
          preditiva definem as zonas Sucesso (≤P25), Segurança (P25–P50), Alerta (P50–P75),
          Epidêmico (P75–P90) e Emergência ({">"}P90).
        </p>
        <p style={{ margin: "0 0 4px", fontSize: 11, color: "#64748b" }}>
          Base histórica: 2022–2025 · Ano monitorado: 2026 · Monte Carlo: 30.000 amostras/SE
        </p>
        <p style={{ margin: 0, fontSize: 11, color: "#64748b" }}>
          Dados: IDS Saúde (Relatório 187) · Município: Rio Claro/SP · Vigilância Epidemiológica, Fundação Municipal de Saúde
        </p>
      </div>

      </>}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));

</script>
</body>
</html>
